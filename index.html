<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script>
  try {
    document.documentElement.setAttribute("data-theme", localStorage.getItem("vtaper_theme") === "light" ? "light" : "dark");
  } catch (e) {}
</script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>V-Taper Log</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="V-Taper Log" />
<meta name="theme-color" content="#000000" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
* { box-sizing: border-box; }
body { margin: 0; background: #000; overflow-x: hidden; }
html[data-theme="light"] body { background: #f5f5f7; }

/* ============================================================
   DESIGN SYSTEM — TOKEN CONTRACT
   Dark (default) + light theme, switched via [data-theme] on <html>.
   Every surface reads from these variables — never hardcode a color,
   radius, or font in a component. See DESIGN_SYSTEM.md for the full spec.
   ============================================================ */
.tracker-root {
  /* -- color -- */
  --bg: #000000; --panel: #17171b; --panel-2: #1f1f25; --panel-3: #2c2c33;
  --text: #f5f5f7; --text-muted: #8d8d96;
  --accent-primary: #8b7ff5; --accent-secondary: #f3a94e; --accent-success: #3ecf8e; --accent-danger: #ff5c72;
  --avatar-bg: #e8e8ec; --avatar-fg: #17171b;
  /* -- type -- */
  --font-display: 'Manrope', sans-serif; --font-body: 'Inter', sans-serif; --font-mono: 'JetBrains Mono', monospace;
  /* -- type scale -- */
  --text-2xs: 10px; --text-xs: 11px; --text-sm: 12px; --text-md: 13px;
  --text-base: 14px; --text-lg: 16px; --text-xl: 20px; --text-2xl: 26px;
  --weight-semibold: 600; --weight-bold: 700; --weight-black: 800;
  /* -- spacing -- */
  --space-card: 12px; --space-page: 16px; --space-section: 14px;
  /* -- shape -- */
  --radius-card: 24px; --radius-ctl: 14px; --radius-pill: 999px;
  --border-w: 1px;
  --shadow-card: 0 10px 30px rgba(0,0,0,0.45);

  background: var(--bg); color: var(--text); font-family: var(--font-body);
  min-height: 100vh; max-width: 480px; margin: 0 auto;
}
/* Light theme — same accent/semantic colors, canvas/surface/ink swapped for light. */
html[data-theme="light"] .tracker-root {
  --bg: #f5f5f7; --panel: #ffffff; --panel-2: #eceef2; --panel-3: #e0e2e8;
  --text: #17171b; --text-muted: #6b6b76;
  --shadow-card: 0 10px 24px rgba(23,23,27,0.10);
}
.tracker-center { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.tracker-emoji { line-height: 1; display: inline-block; }
.tracker-onboard { text-align: center; padding: 40px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.tracker-onboard-title { font-family: var(--font-display); font-weight: var(--weight-black); font-size: var(--text-2xl); letter-spacing: -0.3px; margin: 4px 0 0; }
.tracker-onboard-sub { color: var(--text-muted); font-size: var(--text-md); line-height: 1.5; max-width: 300px; }
.tracker-onboard-hint { color: var(--text-muted); font-size: var(--text-xs); line-height: 1.5; max-width: 280px; margin-top: 4px; }
.tracker-login-error { color: var(--accent-danger); font-size: var(--text-sm); margin: 0; }
.tracker-primary-btn {
  background: var(--accent-primary); color: #fff; font-weight: var(--weight-bold); border: none;
  padding: 15px 20px; border-radius: var(--radius-pill); font-size: var(--text-base); cursor: pointer; margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
  font-family: var(--font-body); box-shadow: 0 10px 24px rgba(139,127,245,0.35);
}
.tracker-primary-btn:disabled { opacity: 0.6; }
.tracker-header { background: var(--bg); padding: var(--space-page) var(--space-page) 0; position: sticky; top: 0; z-index: 5; }
.tracker-scroll-top { padding: 0 var(--space-page); }
.tracker-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-section); }
.tracker-brand { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: var(--weight-black); font-size: var(--text-lg); letter-spacing: -0.2px; color: var(--text); }
.tracker-icon-btn {
  background: var(--panel-2); border: none; color: var(--text-muted); width: 30px; height: 30px;
  border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: var(--text-base);
}
.tracker-icon-btn-lg { width: 40px; height: 40px; }
.tracker-icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.tracker-weekcal { margin-bottom: var(--space-section); }
.tracker-weekcal-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.tracker-weekcal-caption { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); text-align: center; flex: 1; }
.tracker-weekcal-row { display: flex; gap: 6px; }
.tracker-weekcal-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: var(--panel-2); border-radius: var(--radius-pill); padding: 8px 0 10px; }
.tracker-weekcal-dow { font-size: var(--text-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.tracker-weekcal-num { font-family: var(--font-mono); font-size: var(--text-base); font-weight: var(--weight-semibold); color: var(--text); }
.tracker-weekcal-day.is-today { background: var(--accent-primary); }
.tracker-weekcal-day.is-today .tracker-weekcal-dow, .tracker-weekcal-day.is-today .tracker-weekcal-num { color: #fff; }
.tracker-weekcal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-success); }
.tracker-weekcal-day.is-today .tracker-weekcal-dot { background: #fff; }
.tracker-phase-note { background: rgba(243,169,78,0.12); border-radius: var(--radius-card); padding: var(--space-card) var(--space-page); margin-bottom: var(--space-section); font-size: var(--text-sm); color: var(--text); line-height: 1.5; }
.tracker-phase-note-name { font-weight: var(--weight-bold); }
.tracker-phase-note-rpe { font-family: var(--font-mono); color: var(--text-muted); }
.tracker-tabs { display: flex; gap: 4px; background: var(--panel-2); border-radius: var(--radius-pill); padding: 4px; margin-bottom: var(--space-section); }
.tracker-tab { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 9px 0; font-size: var(--text-md); font-weight: var(--weight-semibold); cursor: pointer; border-radius: var(--radius-pill); font-family: var(--font-body); }
.tracker-tab.active { color: #fff; background: var(--accent-primary); }
.tracker-body { padding: var(--space-page); display: flex; flex-direction: column; gap: 10px; padding-bottom: 140px; }
.tracker-select-wrap { position: relative; flex: 1; }
.tracker-day-select-wrap { position: relative; margin-bottom: var(--space-section); }
.tracker-select-wrap::after, .tracker-day-select-wrap::after { content: "▾"; position: absolute; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: var(--text-lg); line-height: 1; pointer-events: none; }
.tracker-select-wrap::after { right: 10px; }
.tracker-day-select-wrap::after { right: 14px; }
.tracker-day-select { width: 100%; appearance: none; -webkit-appearance: none; background: var(--panel-2); border: var(--border-w) solid transparent; color: var(--text); padding: var(--space-card) 32px var(--space-card) var(--space-page); border-radius: var(--radius-ctl); font-size: var(--text-base); font-weight: var(--weight-bold); font-family: var(--font-body); }
.tracker-day-select:focus { border-color: var(--accent-primary); outline: none; }
.tracker-card { background: var(--panel); border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--shadow-card); }
.tracker-card-head { width: 100%; background: transparent; border: none; color: var(--text); padding: var(--space-card) var(--space-page); display: flex; align-items: center; justify-content: space-between; cursor: pointer; text-align: left; }
.tracker-card-head-row { cursor: default; gap: 10px; }
.tracker-card-head-toggle { flex: 1; min-width: 0; background: transparent; border: none; color: inherit; padding: 0; display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; text-align: left; font-family: inherit; }
.tracker-card-head-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
.tracker-ex-avatar { width: 36px; height: 36px; min-width: 36px; border-radius: 50%; background: var(--avatar-bg); display: flex; align-items: center; justify-content: center; }
.tracker-ex-avatar-sm { width: 28px; height: 28px; min-width: 28px; }
.tracker-ex-icon { width: 22px; height: 22px; stroke: var(--avatar-fg); stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.tracker-ex-avatar-sm .tracker-ex-icon { width: 18px; height: 18px; }
.tracker-ex-icon-dot { fill: var(--avatar-fg); stroke: none; }
.tracker-card-titlewrap { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.tracker-card-title { font-size: var(--text-base); font-weight: var(--weight-bold); display: flex; align-items: center; gap: 6px; }
.tracker-card-sub { font-size: var(--text-xs); color: var(--text-muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tracker-badge { background: var(--accent-secondary); color: #1a1206; font-size: var(--text-2xs); font-weight: var(--weight-bold); padding: 2px 7px; border-radius: 10px; }
.tracker-badge-ramp { background: var(--panel-3); color: var(--text-muted); }
.tracker-card-body { padding: 0 var(--space-page) var(--space-card); display: flex; flex-direction: column; gap: 10px; }
.tracker-card-body-standalone { padding-top: var(--space-card); }
.tracker-alt-row { display: flex; align-items: center; gap: 6px; font-size: var(--text-xs); color: var(--text-muted); }
.tracker-alt-row-label { flex: 1; font-size: var(--text-md); color: var(--text); font-weight: var(--weight-semibold); }
.tracker-lib-list { width: 100%; max-height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.tracker-lib-row { width: 100%; background: var(--panel-2); border: none; border-radius: var(--radius-ctl); padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; text-align: left; font-family: var(--font-body); }
.tracker-lib-row-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
.tracker-lib-row-name { font-size: var(--text-md); font-weight: var(--weight-semibold); color: var(--text); }
.tracker-lib-row-equip { font-size: var(--text-xs); color: var(--text-muted); margin-top: 2px; }
.tracker-lib-row-score { font-size: var(--text-sm); color: var(--accent-secondary); white-space: nowrap; }
.tracker-ramp-wrap { background: var(--panel-2); border-radius: var(--radius-ctl); padding: 8px 10px; }
.tracker-ramp-toggle { background: transparent; border: none; color: var(--accent-secondary); font-size: var(--text-sm); font-weight: var(--weight-semibold); display: flex; align-items: center; gap: 6px; cursor: pointer; width: 100%; padding: 0; font-family: var(--font-body); }
.tracker-ramp-body { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.tracker-ramp-step { display: flex; justify-content: space-between; font-size: var(--text-sm); }
.tracker-ramp-note { font-size: var(--text-xs); color: var(--text-muted); line-height: 1.5; margin: 4px 0 0; }
.tracker-timer-btn { border: none; background: var(--panel-2); color: var(--text); padding: 12px 20px; border-radius: var(--radius-pill); font-size: var(--text-lg); font-weight: var(--weight-bold); cursor: pointer; display: flex; align-items: center; gap: 8px; min-height: 44px; }
.tracker-lastsession { font-size: var(--text-xs); color: var(--text-muted); font-family: var(--font-mono); }
.tracker-progression-note { font-size: var(--text-xs); line-height: 1.4; margin-top: 3px; color: var(--text-muted); }
.tracker-progression-note.is-up { color: var(--accent-success); }
.tracker-progression-note.is-down { color: var(--accent-danger); }
.tracker-set-rows { display: flex; flex-direction: column; gap: 6px; }
.tracker-set-row { display: grid; grid-template-columns: 28px 1fr 1fr 30px; gap: 8px; align-items: center; }
.tracker-set-row-head { font-size: var(--text-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.tracker-set-num { font-family: var(--font-mono); color: var(--accent-primary); font-size: var(--text-md); }
.tracker-set-reps-cell { display: flex; align-items: center; gap: 6px; min-width: 0; }
.tracker-set-reps-cell .tracker-input { flex: 1; min-width: 0; }
.tracker-timer-btn.tracker-timer-btn-compact { padding: 6px 10px; min-height: auto; font-size: var(--text-xs); font-weight: var(--weight-semibold); gap: 4px; flex-shrink: 0; }
.tracker-set-check { width: 30px; height: 30px; border-radius: var(--radius-pill); border: none; background: var(--panel-2); color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; flex-shrink: 0; }
.tracker-set-check:disabled { opacity: 0.3; cursor: not-allowed; }
.tracker-set-check.is-checked { background: var(--accent-success); color: #fff; }
.tracker-input { background: var(--panel-2); border: var(--border-w) solid transparent; color: var(--text); padding: 9px 10px; border-radius: var(--radius-ctl); font-size: var(--text-md); font-family: var(--font-mono); width: 100%; }
.tracker-input:focus { outline: none; border-color: var(--accent-primary); }
.tracker-done-btn {
  background: var(--accent-success); color: #fff; border: none; font-weight: var(--weight-bold);
  padding: 10px 0; border-radius: var(--radius-pill); font-size: var(--text-sm); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
  font-family: var(--font-body); margin-top: 2px;
}
.tracker-done-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.tracker-done-btn-undo { background: var(--panel-2); color: var(--text-muted); }
.tracker-done-btn-resting { position: relative; overflow: hidden; background: var(--panel-2); color: var(--text); }
.tracker-done-btn-fill { position: absolute; top: 0; left: 0; bottom: 0; background: var(--accent-primary); transition: width 0.5s linear; z-index: 0; }
.tracker-done-btn-label { position: relative; z-index: 1; display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); }
.tracker-session-bar {
  position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%);
  width: calc(100% - 32px); max-width: 448px; z-index: 20;
}
.tracker-session-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.tracker-session-actions { display: flex; gap: 8px; }
.tracker-session-actions > button { flex: 1; width: auto; margin: 0; }
.tracker-session-elapsed { font-family: var(--font-mono); font-size: var(--text-xl); font-weight: var(--weight-bold); color: var(--text); }
.tracker-session-label { font-size: var(--text-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.tracker-pump-note { font-size: var(--text-sm); color: var(--text-muted); line-height: 1.5; }
.tracker-pump-row { display: grid; grid-template-columns: 2fr 1fr 1fr 28px; gap: 6px; align-items: center; }
.tracker-add-row { background: transparent; border: var(--border-w) dashed var(--panel-3); color: var(--text-muted); padding: 9px; border-radius: var(--radius-ctl); font-size: var(--text-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; }
.tracker-preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.tracker-preset-chip { background: var(--panel-2); border: none; color: var(--text-muted); padding: 6px 12px; border-radius: var(--radius-pill); font-size: var(--text-xs); cursor: pointer; font-family: var(--font-body); }
.tracker-trend-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.tracker-select { width: 100%; appearance: none; -webkit-appearance: none; background: var(--panel-2); border: none; color: var(--text); padding: 8px 26px 8px 10px; border-radius: var(--radius-ctl); font-size: var(--text-sm); font-family: var(--font-body); }
.tracker-empty-note { font-size: var(--text-sm); color: var(--text-muted); text-align: center; padding: var(--space-card) 0; }
.tracker-week-group { display: flex; flex-direction: column; gap: 10px; }
.tracker-week-group-head { font-family: var(--font-display); font-weight: var(--weight-black); font-size: var(--text-md); color: var(--text-muted); margin: 6px 2px 8px; text-transform: uppercase; letter-spacing: 0.4px; }
.tracker-history-row { display: flex; justify-content: space-between; font-size: var(--text-sm); padding: 6px 0; border-bottom: 1px solid var(--panel-3); }
.tracker-history-row:last-child { border-bottom: none; }
.tracker-mono { font-family: var(--font-mono); color: var(--text-muted); }
.tracker-bs-field-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.tracker-bs-field-label { font-size: var(--text-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.tracker-bs-tile { background: var(--panel-2); border-radius: var(--radius-ctl); padding: var(--space-card); }
.tracker-bs-tile-label { font-size: var(--text-2xs); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.tracker-bs-tile-value { font-family: var(--font-mono); font-size: var(--text-base); font-weight: var(--weight-bold); color: var(--text); }
.tracker-bs-tile-delta { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); margin-top: 4px; }
.tracker-bs-row { display: flex; align-items: center; justify-content: space-between; font-size: var(--text-sm); padding: 8px 0; border-bottom: 1px solid var(--panel-3); }
.tracker-bs-row:last-child { border-bottom: none; }
.tracker-confirm-panel { background: rgba(255,92,114,0.12); border-radius: var(--radius-card); padding: var(--space-card) var(--space-page); margin-bottom: var(--space-section); }
.tracker-confirm-text { font-size: var(--text-sm); color: var(--text); line-height: 1.5; margin: 0 0 10px; }
.tracker-confirm-actions { display: flex; gap: 8px; }
.tracker-confirm-cancel { flex: 1; background: var(--panel-3); border: none; color: var(--text); padding: 10px 0; border-radius: var(--radius-pill); font-size: var(--text-sm); font-weight: var(--weight-semibold); cursor: pointer; font-family: var(--font-body); }
.tracker-confirm-danger { flex: 1; background: var(--accent-danger); border: none; color: #fff; padding: 10px 0; border-radius: var(--radius-pill); font-size: var(--text-sm); font-weight: var(--weight-semibold); cursor: pointer; font-family: var(--font-body); }
.tracker-toast {
  position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%);
  z-index: 50; display: flex; align-items: center; gap: 8px; max-width: 88%;
  background: var(--accent-success); color: #fff; font-family: var(--font-body); font-weight: var(--weight-bold);
  font-size: var(--text-md); padding: 12px 20px; border-radius: var(--radius-pill);
  box-shadow: 0 10px 24px rgba(0,0,0,0.5);
  animation: tracker-toast-in 0.22s ease;
}
.tracker-toast span { line-height: 1.2; }
@keyframes tracker-toast-in {
  from { opacity: 0; transform: translate(-50%, 14px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}
.tracker-share-overlay {
  position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,0.6);
  display: flex; align-items: flex-end; justify-content: center;
  animation: tracker-share-fade 0.18s ease;
}
@keyframes tracker-share-fade { from { opacity: 0; } to { opacity: 1; } }
.tracker-share-sheet {
  width: 100%; max-width: 480px; background: var(--panel); border-radius: 28px 28px 0 0;
  padding: var(--space-page) var(--space-page) 26px; display: flex; flex-direction: column; align-items: center; gap: 16px;
  animation: tracker-share-up 0.22s ease;
}
@keyframes tracker-share-up { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.tracker-share-sheet-head { width: 100%; display: flex; align-items: center; justify-content: space-between; font-family: var(--font-display); font-weight: var(--weight-bold); font-size: var(--text-lg); }
.tracker-share-preview-wrap { border-radius: 20px; padding: 16px; display: flex; justify-content: center; max-height: 55vh; overflow-y: auto; }
.tracker-share-preview-light { background: #e8e8ec; }
.tracker-share-preview-dark { background: #000; }
.tracker-share-preview-transparent {
  background-image: repeating-conic-gradient(#2c2c33 0% 25%, #17171b 0% 50%);
  background-size: 16px 16px;
}
.tracker-share-bg-row { display: flex; gap: 18px; }
.tracker-share-swatch { width: 34px; height: 34px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; box-shadow: inset 0 0 0 1px var(--panel-3); }
.tracker-share-swatch.active { border-color: var(--accent-primary); }
.tracker-share-swatch-light { background: #ffffff; }
.tracker-share-swatch-dark { background: #111114; }
.tracker-share-swatch-transparent {
  background-image: repeating-conic-gradient(#c9c9d1 0% 25%, #f2f2f4 0% 50%);
  background-size: 10px 10px;

// Maps an exercise name/target to a movement-pattern icon id. Name keywords that cut
// across muscle groups (a squat is a squat whether it's tagged Quads, Glutes, or
// Adductors) are checked first; everything else falls back to a per-target default.
const getExerciseIcon = (name = "", target = "") => {
  const n = name.toLowerCase();
  if (/squat|lunge|step-up/.test(n)) return "squat";
  if (/extension/.test(n) && target === "Quads") return "leg-extension";
  if (/fly|pec-deck/.test(n) && target !== "Rear delts") return "fly";
  if (/reverse-grip bench|close-grip bench/.test(n)) return "press-flat";
  const byTarget = {
    "Upper chest": "press-incline",
    "Chest": "press-flat",
    "Side delts": "lateral-raise",
    "Rear delts": "rear-delt",
    "Lats": "pulldown",
    "Upper back": "row",
    "Biceps": "curl",
    "Triceps": "triceps",
    "Quads": "squat",
    "Hamstrings": /curl|nordic|ham raise|swiss ball/.test(n) ? "leg-curl" : "hip-hinge",
    "Hamstrings/glutes": "hip-hinge",
    "Glutes": "hip-thrust",
    "Calves": "calf-raise",
    "Core": "core",
    "Adductors": "adductor",
  };
  return byTarget[target] || "press-incline";
};

function resolveExerciseName(id, namesMap) {
  if (EXERCISE_LOOKUP[id]) return EXERCISE_LOOKUP[id].name;
  if (namesMap && namesMap[id]) return namesMap[id];
  return id;
}

// Calendar-day week number for any given date against the program's start date —
// shared by the live "week" counter and History's grouping so both always agree,
// and so correcting startDate (the edit-start-date panel) immediately reflows every
// already-logged session's displayed week instead of leaving old groupings stale.
function weekForDate(startDate, dateLike) {
  if (!startDate) return 1;
  const start = new Date(startDate); start.setHours(0, 0, 0, 0);
  const d = new Date(dateLike); d.setHours(0, 0, 0, 0);
  const days = Math.round((d - start) / 86400000);
  return Math.max(1, Math.floor(days / 7) + 1);
}

function getPhaseInfo(week) {
  if (week <= 4) return { name: "Foundation", rpe: "6-7", desc: "Learn the exercises, groove technique. Don't chase weight yet.", deload: false };
  if (week <= 8) return { name: "Progressive Overload", rpe: "7-8", desc: "Add reps, then weight — beat last session on something.", deload: false };
  if (week === 9) return { name: "Deload", rpe: "5-6", desc: "Cut volume ~50%. Let joints and CNS recover.", deload: true };
  if (week <= 14) return { name: "Volume Phase", rpe: "7-8", desc: "Add 1 set to each priority (★) exercise.", deload: false };
  if (week <= 18) return { name: "Intensification", rpe: "8-9 last set", desc: "Push the last set of priority lifts harder. Keep 1-2 RIR elsewhere.", deload: false };
  if (week === 19) return { name: "Deload", rpe: "5-6", desc: "Cut volume ~50%. Recovery week.", deload: true };
  if (week <= 24) return { name: "Consolidation", rpe: "7-8", desc: "Reassess: compare photos + strength logs to week 1.", deload: false };
  return { name: "Repeat Cycle", rpe: "7-8", desc: "Restart at Progressive-Overload intensity. Rotate a stale exercise if needed.", deload: false };
}

// The RPE badge on an exercise card tracks the *phase's* target effort, not a fixed
// per-exercise number — periodization is the point, so it should move with the phase.
// Intensification (wk 15-18) is the one phase where effort isn't uniform: only priority
// (★) exercises push the last set to 8-9, everything else holds a normal 7-8 with reps
// in reserve. See GYM_KNOWLEDGE.md.
function getDisplayRpe(exercise, phase) {
  if (phase.name === "Intensification") return exercise.priority ? "8-9 last set" : "7-8";
  return phase.rpe;
}

// "6-8" -> [6,8]; a bare "15" -> [15,15]; anything unparseable -> null.
function parseRepRange(reps) {
  const parts = String(reps).split("-").map((n) => parseInt(n, 10));
  if (parts.length === 2 && !Number.isNaN(parts[0]) && !Number.isNaN(parts[1])) return [parts[0], parts[1]];
  const n = parseInt(reps, 10);
  return Number.isNaN(n) ? null : [n, n];
}

// Double-progression call: add weight once every set hits the top of the rep range,
// hold/lower it if a set missed the bottom, otherwise keep chasing reps at the same
// weight. Fully silent during Deload (planned recovery, not a progression week). During
// Foundation, only the "add weight" call is silenced — per getPhaseInfo's "don't chase
// weight yet" — but "hold/lower" still surfaces, since that never conflicts with
// Foundation's intent and is exactly the reps-based feedback that phase needs too.
function getProgressionNote(effective, lastSession, phase) {
  if (phase.deload) return null;
  const range = parseRepRange(effective.reps);
  if (!range || !Array.isArray(lastSession)) return null;
  const [min, max] = range;
  const loggedSets = lastSession.filter((s) => s && s.weight && s.reps);
  if (loggedSets.length === 0) return null;

  if (loggedSets.every((s) => Number(s.reps) >= max)) {
    if (phase.name === "Foundation") return null;
    return { type: "up", text: `Hit ${max}+ reps on every set last time — add weight this session.` };
  }
  if (loggedSets.some((s) => Number(s.reps) < min)) {
    return { type: "down", text: `Missed ${min} reps on a set last time — hold or lower the weight, focus on reps.` };
  }
  return { type: "hold", text: `Within range last time — same weight, chase a rep or two more.` };
}

function fmtDate(d) { return new Date(d).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); }
// YYYY-MM-DD in *local* calendar terms, for pre-filling a native <input type="date">.
// toISOString() would shift the date by the UTC offset and silently pick the wrong day.
function toDateInputValue(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;
}
// mm:ss for under an hour, h:mm:ss past that — used for both the running elapsed
// clock and the estimated-remaining readout.
function fmtDuration(totalSeconds) {
  const s = Math.max(0, Math.round(totalSeconds));
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  const mm = h > 0 ? String(m).padStart(2, "0") : String(m);
  return (h > 0 ? `${h}:${mm}` : mm) + ":" + String(sec).padStart(2, "0");
}
function fmtClock(d) { return new Date(d).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" }); }
const stripNegative = (v) => v.replace(/-/g, "");
const loadJSON = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; } };
const saveJSON = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch (e) { return false; } };

// Does a persisted workout draft actually hold anything the user typed?
const draftHasContent = (d) => {
  if (!d) return false;
  if (d.values && Object.keys(d.values).length > 0) return true;
  if (Array.isArray(d.pumpRows) && d.pumpRows.some((r) => r && r.name && r.name.trim())) return true;
  return false;
};

const API_BASE = "https://vtaper-server.onrender.com";

async function apiFetch(path, token, options = {}) {
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    let msg = `Request failed (${res.status})`;
    try { const body = await res.json(); if (body?.error) msg = body.error; } catch (e) {}
    throw new Error(msg);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function normalizeLog(row) {
  return { id: row.id, date: row.date, dayType: row.day_type, week: row.week, phase: row.phase, exercises: row.exercises || undefined, pump: row.pump || undefined };
}

// Reduces a log into the numbers + exercise breakdown the share card shows.
// Pump/Recovery sessions don't track weight, so they get a sets/movements
// summary instead of a volume figure.
function computeLogStats(log) {
  if (log.pump) {
    const totalSets = log.pump.reduce((sum, r) => sum + (Number(r.sets) || 0), 0);
    return {
      kind: "pump", totalSets, movementCount: log.pump.length,
      items: log.pump.map((r) => ({ name: r.name, detail: `${r.sets || "-"} × ${r.reps || "-"}` })),
    };
  }
  const entries = Object.entries(log.exercises || {}).filter(([id]) => id !== "__meta");
  let totalVolume = 0, totalSets = 0;
  const items = entries.map(([id, sets]) => {
    totalSets += sets.length;
    totalVolume += sets.reduce((s, st) => s + (Number(st.weight) || 0) * (Number(st.reps) || 0), 0);
    return { name: resolveExerciseName(id, log.exercises.__meta?.names), detail: sets.map((s) => `${s.weight || "-"}×${s.reps || "-"}`).join(" · ") };
  });
  return { kind: "lift", totalVolume, totalSets, exerciseCount: items.length, items };
}

function MiniLineChart({ data, emptyText = "Log this exercise at least twice to see a trend." }) {
  if (data.length < 2) return <p className="tracker-empty-note">{emptyText}</p>;
  const w = 300, h = 150, pad = 26;
  const weights = data.map((d) => d.weight);
  const max = Math.max(...weights), min = Math.min(...weights);
  const range = max - min || 1;
  const stepX = (w - pad * 2) / (data.length - 1);
  const points = data.map((d, i) => [pad + i * stepX, h - pad - ((d.weight - min) / range) * (h - pad * 2)]);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: 160 }}>
      <polyline points={points.map((p) => p.join(",")).join(" ")} fill="none" stroke="var(--accent-primary)" strokeWidth="2" />
      {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3" fill="var(--accent-primary)" />)}
      <text x={pad} y={h - 6} fontSize="10" fill="var(--text-muted)">{data[0].date}</text>
      <text x={w - pad} y={h - 6} fontSize="10" fill="var(--text-muted)" textAnchor="end">{data[data.length - 1].date}</text>
    </svg>
  );
}

// Background-safe rest alarm. Scheduling the chime on the Web Audio hardware
// clock (instead of a setTimeout/setInterval) means it still fires when the
// phone is locked or the tab is backgrounded — where JS timers get throttled.
// A near-silent looping buffer keeps the audio session alive so the OS doesn't
// suspend the context.
const RestAudio = (() => {
  let ctx = null;
  let keepAliveSrc = null;
  let keepAliveCount = 0;

  function ensureCtx() {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    if (!ctx) ctx = new AC();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }

  function acquireKeepAlive() {
    if (!ensureCtx()) return;
    keepAliveCount++;
    if (keepAliveSrc) return;
    const buffer = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buffer; src.loop = true;
    const g = ctx.createGain(); g.gain.value = 0.0001;
    src.connect(g).connect(ctx.destination);
    src.start();
    keepAliveSrc = src;
  }

  function releaseKeepAlive() {
    keepAliveCount = Math.max(0, keepAliveCount - 1);
    if (keepAliveCount === 0 && keepAliveSrc) {
      try { keepAliveSrc.stop(); } catch (e) {}
      keepAliveSrc = null;
    }
  }

  function chimeAt(t0) {
    const notes = [[880, 0], [1175, 0.18], [1568, 0.36]]; // A5 → D6 → G6
    return notes.map(([freq, off]) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = "sine"; osc.frequency.value = freq;
      const s = t0 + off;
      g.gain.setValueAtTime(0.0001, s);
      g.gain.exponentialRampToValueAtTime(0.6, s + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0008, s + 0.4);
      osc.connect(g).connect(ctx.destination);
      osc.start(s); osc.stop(s + 0.45);
      return osc;
    });
  }

  // Short blip on start: confirms the tap AND unlocks audio inside the gesture
  // (required on iOS before any scheduled sound will play).
  function blip() {
    if (!ensureCtx()) return;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = "sine"; osc.frequency.value = 660;
    const s = ctx.currentTime;
    g.gain.setValueAtTime(0.0001, s);
    g.gain.exponentialRampToValueAtTime(0.25, s + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0008, s + 0.12);
    osc.connect(g).connect(ctx.destination);
    osc.start(s); osc.stop(s + 0.15);
  }

  // Schedule the alarm `seconds` from now. Returns a cancel() fn.
  function start(seconds) {
    if (!ensureCtx()) return () => {};
    acquireKeepAlive();
    const oscs = chimeAt(ctx.currentTime + Math.max(0, seconds));
    let released = false;
    return () => {
      if (released) return; released = true;
      oscs.forEach((o) => { try { o.stop(); } catch (e) {} });
      releaseKeepAlive();
    };
  }

  return { start, blip };
})();

function RestTimer({ seconds, autoStart, onFinish, compact }) {
  const [remaining, setRemaining] = useState(seconds);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const intervalRef = useRef(null);
  const endTimeRef = useRef(null);
  const cancelAudioRef = useRef(null);

  const clearAudio = () => {
    if (cancelAudioRef.current) { cancelAudioRef.current(); cancelAudioRef.current = null; }
  };

  const finish = () => {
    clearInterval(intervalRef.current);
    setRemaining(0); setRunning(false); setDone(true);
    // Audio alarm was already scheduled and fires on its own (even when locked).
    // Vibrate + notification are best-effort extras for when the app is visible.
    try { navigator.vibrate && navigator.vibrate([300, 120, 300]); } catch (e) {}
    const title = "Rest over 💪", body = "Time for your next set.";
    try {
      if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
        // Shown via the SW registration — displays reliably even when backgrounded on Android.
        navigator.serviceWorker.controller.postMessage({ type: "notify", title, body });
      } else if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, { body, tag: "rest-timer" });
      }
    } catch (e) {}
    if (onFinish) onFinish();
  };

  // Derive remaining from the target timestamp so the display self-corrects
  // after the tab was backgrounded (where setInterval doesn't tick reliably).
  const tick = () => {
    const left = Math.round((endTimeRef.current - Date.now()) / 1000);
    if (left <= 0) finish(); else setRemaining(left);
  };

  const start = () => {
    setDone(false);
    endTimeRef.current = Date.now() + remaining * 1000;
    RestAudio.blip();
    cancelAudioRef.current = RestAudio.start(remaining);
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission().catch(() => {});
    }
    setRunning(true);
    clearInterval(intervalRef.current);
    intervalRef.current = setInterval(tick, 500);
  };

  const pause = () => {
    clearInterval(intervalRef.current);
    clearAudio();
    if (endTimeRef.current) setRemaining(Math.max(0, Math.round((endTimeRef.current - Date.now()) / 1000)));
    setRunning(false);
  };

  const reset = () => {
    clearInterval(intervalRef.current);
    clearAudio();
    endTimeRef.current = null;
    setRemaining(seconds); setRunning(false); setDone(false);
  };

  // Re-sync the instant the tab regains focus (mobile throttles background timers).
  useEffect(() => {
    const onVis = () => { if (!document.hidden && running) tick(); };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, [running]);

  // autoStart timers (per-set rest, rest-before-next-exercise) are only ever mounted
  // at the moment they should start counting down, so a mount-only effect is enough —
  // no need for a separate "trigger" value to watch.
  useEffect(() => { if (autoStart) start(); }, []);

  // `seconds` can change after mount — e.g. swapping to a library substitute with a
  // different compound/isolation rest target. Only apply it while idle so we never
  // yank the clock out from under an active countdown.
  useEffect(() => {
    if (!running && !done) setRemaining(seconds);
  }, [seconds]);

  useEffect(() => () => { clearInterval(intervalRef.current); clearAudio(); }, []);

  const handleClick = () => { if (done) reset(); else if (running) pause(); else start(); };
  const mm = Math.floor(remaining / 60), ss = remaining % 60;

  // Compact form: just an icon + countdown, sized to sit inline next to a set's reps
  // input instead of as its own row — used for the between-set timer, which is meant
  // to shrink that field and disappear the instant it hits zero (the parent unmounts
  // it via onFinish), not linger showing a "Done" state like the full timer does.
  if (compact) {
    return (
      <button onClick={handleClick} className="tracker-timer-btn tracker-timer-btn-compact"
        title="Rest — tap to pause/resume"
        style={{ background: running ? "var(--accent-primary)" : "var(--panel-2)", color: running ? "#fff" : "var(--text-muted)" }}>
        <E size={12}>⏱</E>
        <span style={{ fontFamily: "var(--font-mono)" }}>{mm}:{ss.toString().padStart(2, "0")}</span>
      </button>
    );
  }

  // Takes over the Done button's own spot for the rest-before-next-exercise period —
  // no separate card. The fill drains from 100% to 0% as a progress bar; onFinish
  // (wired to clear the parent's restingVariantId) fires the moment it empties, which
  // is what actually triggers this exercise collapsing and the next one opening.
  const pct = Math.max(0, Math.min(100, (remaining / seconds) * 100));
  return (
    <button onClick={handleClick} className="tracker-done-btn tracker-done-btn-resting" title="Resting — tap to pause/resume">
      <span className="tracker-done-btn-fill" style={{ width: `${pct}%` }} />
      <span className="tracker-done-btn-label"><E size={14}>⏱</E> Resting {mm}:{ss.toString().padStart(2, "0")}</span>
    </button>
  );
}
