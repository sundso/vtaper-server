<style>

* { box-sizing: border-box; }
body { margin: 0; background: #0B0C0E; }

    { id: "ub6", name: "Face Pull", target: "Rear delts", sets: 3, reps: "15-20", rest: 60, restLabel: "60s", rpe: "7-8", priority: false, alt: "Rear delt fly" },

    { id: "lb2", name: "Lying Leg Curl", target: "Hamstrings", sets: 3, reps: "10-15", rest: 90, restLabel: "90s", rpe: "7-8", priority: false, alt: "Seated leg curl" },
    { id: "lb3", name: "DB Romanian Deadlift", target: "Hamstrings/glutes", sets: 3, reps: "10-15", rest: 90, restLabel: "90s", rpe: "7", priority: false, alt: "Glute kickback machine / cable pull-through (zero hinge option)" },

    { id: "lb5", name: "Calf Raise (seated)", target: "Calves", sets: 3, reps: "12-20", rest: 60, restLabel: "60s", rpe: "7-8", priority: false, alt: "Standing calf raise" },

};

const DAY_ORDER = ["Upper A", "Lower A", "Upper B", "Lower B"];
const PUMP_PRESETS = ["Band Pull-Aparts", "Light Face Pulls", "Light Cable Lateral Raise", "Light Lat Pulldown", "Easy Incline Walk"];

function getPhaseInfo(week) {
  if (week <= 4) return { name: "Foundation", rpe: "6-7", desc: "Learn the exercises, groove technique. Don't chase weight yet.", deload: false };
  if (week <= 8) return { name: "Progressive Overload", rpe: "7-8", desc: "Add reps, then weight — beat last session on something.", deload: false };
  if (week === 9) return { name: "Deload", rpe: "5-6", desc: "Cut volume ~50%. Let joints and CNS recover.", deload: true };
  if (week <= 14) return { name: "Volume Phase", rpe: "7-8", desc: "Add 1 set to each priority (★) exercise.", deload: false };
  if (week <= 18) return { name: "Intensification", rpe: "8-9 last set", desc: "Push the last set of priority lifts harder. Keep 1-2 RIR elsewhere.", deload: false };
  if (week === 19) return { name: "Deload", rpe: "5-6", desc: "Cut volume ~50%. Recovery week.", deload: true };
  if (week <= 24) return { name: "Consolidation", rpe: "7-8", desc: "Reassess: compare photos + strength logs to week 1.", deload: false };
  return { name: "Repeat Cycle", rpe: "7-8", desc: "Restart at Progressive-Overload intensity. Rotate a stale exercise if needed.", deload: false };
}

function fmtDate(d) { return new Date(d).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); }
const stripNegative = (v) => v.replace(/-/g, "");
const loadJSON = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; } };
const saveJSON = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); return true; } catch (e) { return false; } };

const API_BASE = "https://vtaper-server.onrender.com";

async function apiFetch(path, token, options = {}) {
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    let msg = `Request failed (${res.status})`;
    try { const body = await res.json(); if (body?.error) msg = body.error; } catch (e) {}
    throw new Error(msg);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function normalizeLog(row) {
  return { date: row.date, dayType: row.day_type, week: row.week, phase: row.phase, exercises: row.exercises || undefined, pump: row.pump || undefined };
}

function MiniLineChart({ data }) {
  if (data.length < 2) return <p className="tracker-empty-note">Log this exercise at least twice to see a trend.</p>;
  const w = 300, h = 150, pad = 26;
  const weights = data.map((d) => d.weight);
  const max = Math.max(...weights), min = Math.min(...weights);
  const range = max - min || 1;
  const stepX = (w - pad * 2) / (data.length - 1);
  const points = data.map((d, i) => [pad + i * stepX, h - pad - ((d.weight - min) / range) * (h - pad * 2)]);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: 160 }}>
      <polyline points={points.map((p) => p.join(",")).join(" ")} fill="none" stroke="var(--accent-brass)" strokeWidth="2" />
      {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3" fill="var(--accent-brass)" />)}
      <text x={pad} y={h - 6} fontSize="10" fill="var(--text-muted)">{data[0].date}</text>
      <text x={w - pad} y={h - 6} fontSize="10" fill="var(--text-muted)" textAnchor="end">{data[data.length - 1].date}</text>
    </svg>
  );
}

function RestTimer({ seconds, label }) {
  const [remaining, setRemaining] = useState(seconds);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setRemaining((r) => {
          if (r <= 1) { clearInterval(intervalRef.current); setRunning(false); setDone(true);
            try { navigator.vibrate && navigator.vibrate(200); } catch (e) {}
            return 0; }
          return r - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const reset = () => { clearInterval(intervalRef.current); setRemaining(seconds); setRunning(false); setDone(false); };
  const mm = Math.floor(remaining / 60), ss = remaining % 60;

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <button onClick={() => (done ? reset() : setRunning((r) => !r))} className="tracker-timer-btn"
        style={{ background: done ? "var(--accent-green)" : running ? "var(--accent-brass)" : "transparent" }}>
        <E size={13}>⏱</E>
        <span style={{ fontFamily: "var(--font-mono)" }}>{done ? "Done" : `${mm}:${ss.toString().padStart(2, "0")}`}</span>
      </button>
      {(running || remaining !== seconds) && !done && (
        <button onClick={reset} className="tracker-icon-btn" title="Reset timer"><E size={12}>↺</E></button>
      )}
      <span className="tracker-rest-label">rest {label}</span>
    </div>
  );
}

function ExerciseCard({ exercise, phase, lastSession, values, onChange, isFirst }) {
  const [open, setOpen] = useState(true);
  const [showRamp, setShowRamp] = useState(false);
  const extraSet = phase.name === "Volume Phase" && exercise.priority;
  const totalSets = extraSet ? exercise.sets + 1 : exercise.sets;

  return (
    <div className="tracker-card">
      <button className="tracker-card-head" onClick={() => setOpen((o) => !o)}>
        <div className="tracker-card-titlewrap">
          <div className="tracker-card-title">
            {exercise.priority && <E size={13}><span style={{ color: "var(--accent-brass)" }}>★</span></E>}
            {exercise.name}
          </div>
          <div className="tracker-card-sub">
            {exercise.target} · {totalSets}×{exercise.reps} · RPE {exercise.rpe}
            {extraSet && <span className="tracker-badge">+1 set this phase</span>}
            {isFirst && <span className="tracker-badge tracker-badge-ramp">warm-up first</span>}
          </div>
        </div>
        <E size={16}>{open ? "▴" : "▾"}</E>
      </button>

      {open && (
        <div className="tracker-card-body">
          {exercise.alt && (
            <div className="tracker-alt-row"><E size={12}>⇄</E><span><strong>Alt:</strong> {exercise.alt}</span></div>
          )}

          {isFirst && (
            <div className="tracker-ramp-wrap">
              <button className="tracker-ramp-toggle" onClick={() => setShowRamp((s) => !s)}>
                <E size={13}>🔥</E> Warm-up ramp <E size={13}>{showRamp ? "▴" : "▾"}</E>
              </button>
              {showRamp && (
                <div className="tracker-ramp-body">
                  <div className="tracker-ramp-step"><span>Set 1</span><span className="tracker-mono">~50% of working weight × 8</span></div>
                  <div className="tracker-ramp-step"><span>Set 2</span><span className="tracker-mono">~75% of working weight × 5</span></div>
                  <p className="tracker-ramp-note">Then go straight into your working sets below. Do this before this exercise only — everything else today just needs a slightly conservative first set.</p>
                </div>
              )}
            </div>
          )}

          <RestTimer seconds={exercise.rest} label={exercise.restLabel} />

          {lastSession && (
            <div className="tracker-lastsession">Last time: {lastSession.map((s) => `${s.weight || "-"}×${s.reps || "-"}`).join("  ·  ")}</div>
          )}

          <div className="tracker-set-rows">
            <div className="tracker-set-row tracker-set-row-head"><span>Set</span><span>Weight</span><span>Reps</span></div>
            {Array.from({ length: totalSets }).map((_, i) => (
              <div className="tracker-set-row" key={i}>
                <span className="tracker-set-num">{i + 1}</span>
                <input type="number" inputMode="decimal" min="0"
                  placeholder={lastSession?.[i]?.weight ? String(lastSession[i].weight) : "kg"}
                  value={values?.[i]?.weight ?? ""}
                  onChange={(e) => onChange(exercise.id, i, "weight", e.target.value)}
                  className="tracker-input" />
                <input type="number" inputMode="numeric" min="0"
                  placeholder={lastSession?.[i]?.reps ? String(lastSession[i].reps) : "reps"}
                  value={values?.[i]?.reps ?? ""}
                  onChange={(e) => onChange(exercise.id, i, "reps", e.target.value)}
                  className="tracker-input" />
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function WeekLoader({ week }) {
  const cycleWeek = ((week - 1) % 24) + 1;
  const cycleNum = Math.floor((week - 1) / 24) + 1;
  return (
    <div className="tracker-loader-wrap">
      <div className="tracker-bar">
        {Array.from({ length: 24 }).map((_, i) => {
          const w = i + 1, filled = w <= cycleWeek, isDeload = w === 9 || w === 19;
          return <div key={i} className="tracker-plate" style={{ background: filled ? (isDeload ? "var(--accent-rust)" : "var(--accent-brass)") : "var(--panel-3)", height: isDeload ? "22px" : "16px", opacity: filled ? 1 : 0.5 }} title={`Week ${w}${isDeload ? " (deload)" : ""}`} />;
        })}
      </div>
      <div className="tracker-loader-caption">Week {cycleWeek} of 24{cycleNum > 1 ? ` · Cycle ${cycleNum}` : ""}</div>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [token, setToken] = useState(null);
  const [loginUsername, setLoginUsername] = useState("");
  const [loginPassword, setLoginPassword] = useState("");
  const [loginError, setLoginError] = useState("");
  const [loggingIn, setLoggingIn] = useState(false);
  const [wakingServer, setWakingServer] = useState(false);
  const [dataError, setDataError] = useState("");
  const [startDate, setStartDate] = useState(null);
  const [logs, setLogs] = useState([]);
  const [tab, setTab] = useState("today");
  const [dayType, setDayType] = useState("Upper A");
  const [values, setValues] = useState({});
  const [saved, setSaved] = useState(false);
  const [expandedLog, setExpandedLog] = useState(null);
  const [trendExercise, setTrendExercise] = useState("Cable Lateral Raise");
  const [pumpRows, setPumpRows] = useState([{ name: "", sets: "", reps: "" }]);
  const [confirmingReset, setConfirmingReset] = useState(false);
  const [confirmingLogout, setConfirmingLogout] = useState(false);

  const loadAppData = async (tok) => {
    setWakingServer(true);
    setDataError("");
    try {
      const [meta, logsData] = await Promise.all([apiFetch("/api/meta", tok), apiFetch("/api/logs", tok)]);
      setStartDate(meta ? meta.start_date : null);
      setLogs((logsData || []).map(normalizeLog));
    } catch (err) {
      if (/token|credentials/i.test(err.message)) {
        localStorage.removeItem("vtaper_token");
        setToken(null);
      } else {
        setDataError(err.message || "Couldn't load your data");
      }
    } finally {
      setWakingServer(false);
      setLoading(false);
    }
  };

  useEffect(() => {
    const saved = loadJSON("vtaper_token", null);
    if (saved) {
      setToken(saved);
      loadAppData(saved);
    } else {
      setLoading(false);
    }
  }, []);

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoginError("");
    setLoggingIn(true);
    try {
      const data = await apiFetch("/api/auth/login", null, {
        method: "POST",
        body: JSON.stringify({ username: loginUsername, password: loginPassword }),
      });
      saveJSON("vtaper_token", data.token);
      setToken(data.token);
      await loadAppData(data.token);
    } catch (err) {
      setLoginError(err.message || "Login failed");
    } finally {
      setLoggingIn(false);
    }
  };

  const logout = () => {
    localStorage.removeItem("vtaper_token");
    setToken(null);
    setStartDate(null);
    setLogs([]);
  };

  const week = useMemo(() => {
    if (!startDate) return 1;
    const days = Math.floor((Date.now() - new Date(startDate).getTime()) / 86400000);
    return Math.max(1, Math.floor(days / 7) + 1);
  }, [startDate]);

  const phase = getPhaseInfo(week);

  useEffect(() => {
    const lifting = logs.filter((l) => DAY_ORDER.includes(l.dayType));
    if (lifting.length > 0) {
      const last = lifting[lifting.length - 1];
      const idx = DAY_ORDER.indexOf(last.dayType);
      setDayType(DAY_ORDER[(idx + 1) % DAY_ORDER.length]);
    }
  }, [logs.length]);

  const startProgram = async () => {
    const today = new Date().toISOString();
    setDataError("");
    try {
      await apiFetch("/api/meta", token, { method: "POST", body: JSON.stringify({ startDate: today }) });
      setStartDate(today);
    } catch (err) {
      setDataError(err.message || "Couldn't start the program");
    }
  };

  const lastSessionFor = (dt, exerciseId) => {
    const matches = logs.filter((l) => l.dayType === dt && l.exercises?.[exerciseId]);
    if (matches.length === 0) return null;
    return matches[matches.length - 1].exercises[exerciseId];
  };

  // Pre-fill this day's inputs with last time's numbers, so you're adjusting instead of retyping from scratch.
  useEffect(() => {
    if (dayType === "Pump/Recovery" || !PROGRAM[dayType]) return;
    const seeded = {};
    PROGRAM[dayType].forEach((ex) => {
      const last = lastSessionFor(dayType, ex.id);
      if (last) seeded[ex.id] = last.map((s) => ({ weight: s.weight ?? "", reps: s.reps ?? "" }));
    });
    setValues(seeded);
  }, [dayType, logs]);

  const handleChange = (exerciseId, setIdx, field, val) => {
    const clean = stripNegative(val);
    setValues((prev) => {
      const ex = prev[exerciseId] ? [...prev[exerciseId]] : [];
      ex[setIdx] = { ...ex[setIdx], [field]: clean };
      return { ...prev, [exerciseId]: ex };
    });
  };

  const saveWorkout = async () => {
    const exercisesLogged = {};
    Object.entries(values).forEach(([id, sets]) => {
      const cleaned = sets.filter((s) => s && (s.weight || s.reps));
      if (cleaned.length > 0) exercisesLogged[id] = cleaned;
    });
    if (Object.keys(exercisesLogged).length === 0) return;
    setDataError("");
    try {
      const row = await apiFetch("/api/logs", token, {
        method: "POST",
        body: JSON.stringify({ date: new Date().toISOString(), dayType, week, phase: phase.name, exercises: exercisesLogged }),
      });
      setLogs((prev) => [...prev, normalizeLog(row)]);
      setValues({});
      setSaved(true); setTimeout(() => setSaved(false), 2000);
    } catch (err) {
      setDataError(err.message || "Couldn't save that workout");
    }
  };

  const savePumpDay = async () => {
    const cleaned = pumpRows.filter((r) => r.name.trim());
    if (cleaned.length === 0) return;
    setDataError("");
    try {
      const row = await apiFetch("/api/logs", token, {
        method: "POST",
        body: JSON.stringify({ date: new Date().toISOString(), dayType: "Pump/Recovery", week, phase: phase.name, pump: cleaned }),
      });
      setLogs((prev) => [...prev, normalizeLog(row)]);
      setPumpRows([{ name: "", sets: "", reps: "" }]);
      setSaved(true); setTimeout(() => setSaved(false), 2000);
    } catch (err) {
      setDataError(err.message || "Couldn't save that session");
    }
  };

  const resetAll = async () => {
    setConfirmingReset(false);
    setDataError("");
    try {
      await apiFetch("/api/reset", token, { method: "DELETE" });
    } catch (err) {
      setDataError(err.message || "Couldn't reset — your data may still be intact");
    }
    setLogs([]);
    setStartDate(null);
  };

  const exportData = () => {
    const payload = JSON.stringify({ startDate, logs }, null, 2);
    const blob = new Blob([payload], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `vtaper-log-backup-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const addPumpPreset = (name) => {
    setPumpRows((prev) => {
      const lastEmpty = prev.length > 0 && !prev[prev.length - 1].name.trim();
      const preset = { name, sets: name === "Easy Incline Walk" ? "1" : "2", reps: name === "Easy Incline Walk" ? "10 min" : "15-20" };
      if (lastEmpty) { const copy = [...prev]; copy[copy.length - 1] = preset; return copy; }
      return [...prev, preset];
    });
  };

  const allExerciseNames = useMemo(() => {
    const names = new Set();
    Object.values(PROGRAM).forEach((list) => list.forEach((e) => names.add(e.name)));
    return Array.from(names);
  }, []);

  const trendData = useMemo(() => {
    const idMatch = Object.values(PROGRAM).flat().find((e) => e.name === trendExercise);
    if (!idMatch) return [];
    return logs.filter((l) => l.exercises?.[idMatch.id]).map((l) => {
      const sets = l.exercises[idMatch.id];
      const top = Math.max(...sets.map((s) => Number(s.weight) || 0));
      return { date: fmtDate(l.date), weight: top };
    });
  }, [logs, trendExercise]);

  const liftingLogsDesc = [...logs].reverse();

  if (!token) {
    return (
      <div className="tracker-root tracker-center">
        <form className="tracker-onboard" onSubmit={handleLogin}>
          <E size={36}>🏋</E>
          <h1 className="tracker-onboard-title">V-Taper Log</h1>
          <p className="tracker-onboard-sub">Log in to sync your workouts across every device.</p>
          <input className="tracker-input" style={{ width: "100%" }} placeholder="Username" value={loginUsername} onChange={(e) => setLoginUsername(e.target.value)} autoCapitalize="none" />
          <input className="tracker-input" style={{ width: "100%" }} type="password" placeholder="Password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} />
          {loginError && <p className="tracker-login-error">{loginError}</p>}
          <button className="tracker-primary-btn" type="submit" disabled={loggingIn}>{loggingIn ? "Logging in…" : "Log in"}</button>
          <p className="tracker-onboard-hint">First request can take up to a minute if the server's been idle — that's normal, not an error.</p>
        </form>
      </div>
    );
  }

  if (loading || wakingServer) {
    return (
      <div className="tracker-root tracker-center">
        <div className="tracker-onboard">
          <E size={28}>🏋</E>
          <p className="tracker-onboard-sub">Connecting to the server… this can take up to a minute if it's been idle.</p>
        </div>
      </div>
    );
  }

  if (!startDate) {
    return (
      <div className="tracker-root tracker-center">
        <div className="tracker-onboard">
          <E size={36}>🏋</E>
          <h1 className="tracker-onboard-title">V-Taper Log</h1>
          <p className="tracker-onboard-sub">Your 6-month hypertrophy program, tracked. Sets, reps, rest, and phase — all in one place.</p>
          {dataError && <p className="tracker-login-error">{dataError}</p>}
          <button className="tracker-primary-btn" onClick={startProgram}>Start Day 1 Today</button>
        </div>
      </div>
    );
  }

  return (
    <div className="tracker-root">
      <div className="tracker-header">
        <div className="tracker-header-top">
          <div className="tracker-brand"><E size={18}>🏋</E><span>V-Taper Log</span></div>
          <div style={{ display: "flex", gap: 6 }}>
            <button className="tracker-icon-btn tracker-icon-btn-lg" onClick={exportData} title="Export backup"><E size={19}>⬇</E></button>
            <button className="tracker-icon-btn tracker-icon-btn-lg" onClick={() => setConfirmingReset(true)} title="Reset all data"><E size={19}>↺</E></button>
            <button className="tracker-icon-btn tracker-icon-btn-lg" onClick={() => setConfirmingLogout(true)} title="Log out"><E size={19}>⏻</E></button>
          </div>
        </div>

        {dataError && (
          <div className="tracker-confirm-panel">
            <p className="tracker-confirm-text">{dataError}</p>
          </div>
        )}

        {confirmingReset && (
          <div className="tracker-confirm-panel">
            <p className="tracker-confirm-text">This erases every logged workout and your start date, permanently. Consider tapping the download icon to export a backup first.</p>
            <div className="tracker-confirm-actions">
              <button className="tracker-confirm-cancel" onClick={() => setConfirmingReset(false)}>Cancel</button>
              <button className="tracker-confirm-danger" onClick={resetAll}>Yes, delete everything</button>
            </div>
          </div>
        )}

        {confirmingLogout && (
          <div className="tracker-confirm-panel">
            <p className="tracker-confirm-text">You'll need your username and password to log back in on this device. Your workout data stays safe on the server either way.</p>
            <div className="tracker-confirm-actions">
              <button className="tracker-confirm-cancel" onClick={() => setConfirmingLogout(false)}>Cancel</button>
              <button className="tracker-confirm-danger" onClick={() => { setConfirmingLogout(false); logout(); }}>Log out</button>
            </div>
          </div>
        )}

        <WeekLoader week={week} />

        <div className={`tracker-phase-banner ${phase.deload ? "is-deload" : ""}`}>
          <div className="tracker-phase-name">{phase.name}</div>
          <div className="tracker-phase-desc">{phase.desc}</div>
          <div className="tracker-phase-rpe">Target RPE {phase.rpe}</div>
        </div>

        <div className="tracker-tabs">
          <button className={`tracker-tab ${tab === "today" ? "active" : ""}`} onClick={() => setTab("today")}>Today</button>
          <button className={`tracker-tab ${tab === "history" ? "active" : ""}`} onClick={() => setTab("history")}>History</button>
        </div>
      </div>

      {tab === "today" && (
        <div className="tracker-body">
          <div className="tracker-day-select">
            {[...DAY_ORDER, "Pump/Recovery"].map((d) => (
              <button key={d} className={`tracker-day-btn ${dayType === d ? "active" : ""}`} onClick={() => setDayType(d)}>{d}</button>
            ))}
          </div>

          {dayType !== "Pump/Recovery" && (
            <div className="tracker-card tracker-warmup-card">
              <div className="tracker-card-body" style={{ paddingTop: 14 }}>
                <div className="tracker-warmup-title"><E size={14}><span style={{ color: "var(--accent-rust)" }}>🔥</span></E>General warm-up (5-8 min, before lifting)</div>
                <p className="tracker-pump-note">5 min light cardio (bike/rower) · dynamic mobility — arm circles, band pull-aparts, hip circles{dayType.startsWith("Lower") ? ", leg swings" : ""}. Then ramp-up sets on the first exercise below.</p>
              </div>
            </div>
          )}

          {dayType === "Pump/Recovery" ? (
            <div className="tracker-card">
              <div className="tracker-card-body" style={{ paddingTop: 14 }}>
                <p className="tracker-pump-note">RPE 3-4, ~15 min, well short of failure. Tap a preset or add your own.</p>
                <div className="tracker-preset-row">
                  {PUMP_PRESETS.map((p) => <button key={p} className="tracker-preset-chip" onClick={() => addPumpPreset(p)}>{p}</button>)}
                </div>
                {pumpRows.map((row, i) => (
                  <div className="tracker-pump-row" key={i}>
                    <input className="tracker-input" placeholder="Movement" value={row.name}
                      onChange={(e) => { const r = [...pumpRows]; r[i].name = e.target.value; setPumpRows(r); }} />
                    <input className="tracker-input" placeholder="sets" value={row.sets}
                      onChange={(e) => { const r = [...pumpRows]; r[i].sets = stripNegative(e.target.value); setPumpRows(r); }} />
                    <input className="tracker-input" placeholder="reps" value={row.reps}
                      onChange={(e) => { const r = [...pumpRows]; r[i].reps = stripNegative(e.target.value); setPumpRows(r); }} />
                    <button className="tracker-icon-btn" onClick={() => setPumpRows(pumpRows.filter((_, idx) => idx !== i))}><E size={13}>🗑</E></button>
                  </div>
                ))}
                <button className="tracker-add-row" onClick={() => setPumpRows([...pumpRows, { name: "", sets: "", reps: "" }])}><E size={13}>+</E> Add movement</button>
              </div>
            </div>
          ) : (
            PROGRAM[dayType].map((ex, idx) => (
              <ExerciseCard key={ex.id} exercise={ex} phase={phase} lastSession={lastSessionFor(dayType, ex.id)} values={values[ex.id]} onChange={handleChange} isFirst={idx === 0} />
            ))
          )}

          <button className="tracker-primary-btn tracker-save-btn" onClick={dayType === "Pump/Recovery" ? savePumpDay : saveWorkout}>
            {saved ? <><E size={15}>✓</E> Saved</> : "Save Workout"}
          </button>
        </div>
      )}

      {tab === "history" && (
        <div className="tracker-body">
          <div className="tracker-card">
            <div className="tracker-card-body" style={{ paddingTop: 14 }}>
              <div className="tracker-trend-head">
                <E size={14}><span style={{ color: "var(--accent-brass)" }}>📈</span></E>
                <select className="tracker-select" value={trendExercise} onChange={(e) => setTrendExercise(e.target.value)}>
                  {allExerciseNames.map((n) => <option key={n} value={n}>{n}</option>)}
                </select>
              </div>
              <MiniLineChart data={trendData} />
            </div>
          </div>

          {liftingLogsDesc.length === 0 && <p className="tracker-empty-note">No sessions logged yet.</p>}

          {liftingLogsDesc.map((log, i) => {
            const key = log.date + i;
            const isOpen = expandedLog === key;
            return (
              <div className="tracker-card" key={key}>
                <button className="tracker-card-head" onClick={() => setExpandedLog(isOpen ? null : key)}>
                  <div className="tracker-card-titlewrap">
                    <div className="tracker-card-title">{log.dayType}</div>
                    <div className="tracker-card-sub">{fmtDate(log.date)} · Week {log.week} · {log.phase}</div>
                  </div>
                  <E size={16}>{isOpen ? "▴" : "▾"}</E>
                </button>
                {isOpen && (
                  <div className="tracker-card-body">
                    {log.pump
                      ? log.pump.map((p, idx) => <div className="tracker-history-row" key={idx}><span>{p.name}</span><span className="tracker-mono">{p.sets}×{p.reps}</span></div>)
                      : Object.entries(log.exercises).map(([id, sets]) => {
                          const ex = Object.values(PROGRAM).flat().find((e) => e.id === id);
                          return <div className="tracker-history-row" key={id}><span>{ex?.name || id}</span><span className="tracker-mono">{sets.map((s) => `${s.weight || "-"}×${s.reps || "-"}`).join("  ")}</span></div>;
                        })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
