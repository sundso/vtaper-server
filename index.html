<html lang="en">
<head>

<title>V-Taper Log</title>

<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
* { box-sizing: border-box; }
body { margin: 0; background: #000; }

/* ============================================================
   DESIGN SYSTEM — TOKEN CONTRACT
   One dark theme. Every surface reads from these variables —
   never hardcode a color, radius, or font in a component.
   See DESIGN_SYSTEM.md for the full spec.
   ============================================================ */
.tracker-root {
  /* -- color -- */
  --bg: #000000; --panel: #17171b; --panel-2: #1f1f25; --panel-3: #2c2c33;
  --text: #f5f5f7; --text-muted: #8d8d96;
  --accent-primary: #8b7ff5; --accent-secondary: #f3a94e; --accent-success: #3ecf8e; --accent-danger: #ff5c72;
  /* -- type -- */
  --font-display: 'Manrope', sans-serif; --font-body: 'Inter', sans-serif; --font-mono: 'JetBrains Mono', monospace;
  /* -- shape -- */
  --radius-card: 24px; --radius-ctl: 14px; --radius-pill: 999px;
  --border-w: 1px;
  --shadow-card: 0 10px 30px rgba(0,0,0,0.45);

  background: var(--bg); color: var(--text); font-family: var(--font-body);
  min-height: 100vh; max-width: 480px; margin: 0 auto; overflow-x: hidden;
}
.tracker-center { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.tracker-emoji { line-height: 1; display: inline-block; }
.tracker-onboard { text-align: center; padding: 40px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.tracker-onboard-title { font-family: var(--font-display); font-weight: 800; font-size: 26px; letter-spacing: -0.3px; margin: 4px 0 0; }
.tracker-onboard-sub { color: var(--text-muted); font-size: 13px; line-height: 1.5; max-width: 300px; }
.tracker-onboard-hint { color: var(--text-muted); font-size: 11px; line-height: 1.5; max-width: 280px; margin-top: 4px; }
.tracker-login-error { color: var(--accent-danger); font-size: 12px; margin: 0; }
.tracker-primary-btn {
  background: var(--accent-primary); color: #fff; font-weight: 700; border: none;
  padding: 15px 20px; border-radius: var(--radius-pill); font-size: 14px; cursor: pointer; margin-top: 8px;
  display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
  font-family: var(--font-body); box-shadow: 0 10px 24px rgba(139,127,245,0.35);
}
.tracker-primary-btn:disabled { opacity: 0.6; }
.tracker-header { background: var(--bg); padding: 18px 18px 0; position: sticky; top: 0; z-index: 5; }
.tracker-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.tracker-brand { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-weight: 800; font-size: 17px; letter-spacing: -0.2px; color: var(--text); }
.tracker-icon-btn {
  background: var(--panel-2); border: none; color: var(--text-muted); width: 30px; height: 30px;
  border-radius: var(--radius-pill); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px;
}
.tracker-icon-btn-lg { width: 40px; height: 40px; }
.tracker-icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.tracker-weekcal { margin-bottom: 14px; }
.tracker-weekcal-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
.tracker-weekcal-caption { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-align: center; flex: 1; }
.tracker-weekcal-row { display: flex; gap: 6px; }
.tracker-weekcal-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: var(--panel-2); border-radius: var(--radius-pill); padding: 8px 0 10px; }
.tracker-weekcal-dow { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.tracker-weekcal-num { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--text); }
.tracker-weekcal-day.is-today { background: var(--accent-primary); }
.tracker-weekcal-day.is-today .tracker-weekcal-dow, .tracker-weekcal-day.is-today .tracker-weekcal-num { color: #fff; }
.tracker-weekcal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-success); }
.tracker-weekcal-day.is-today .tracker-weekcal-dot { background: #fff; }
.tracker-phase-banner { background: linear-gradient(135deg, var(--accent-primary), #6f61e8); border-radius: var(--radius-card); padding: 18px 20px; margin-bottom: 14px; box-shadow: var(--shadow-card); }
.tracker-phase-banner.is-deload { background: linear-gradient(135deg, var(--accent-danger), #e6435c); }
.tracker-phase-name { font-family: var(--font-display); font-weight: 800; font-size: 20px; color: #fff; }
.tracker-phase-desc { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 4px; line-height: 1.4; }
.tracker-phase-rpe { font-family: var(--font-mono); font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 8px; }
.tracker-tabs { display: flex; gap: 4px; background: var(--panel-2); border-radius: var(--radius-pill); padding: 4px; }
.tracker-tab { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 9px 0; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: var(--radius-pill); font-family: var(--font-body); }
.tracker-tab.active { color: #fff; background: var(--accent-primary); }
.tracker-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
.tracker-day-select { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.tracker-day-btn { background: var(--panel-2); border: none; color: var(--text-muted); padding: 8px 14px; border-radius: var(--radius-pill); font-size: 12px; cursor: pointer; font-family: var(--font-body); font-weight: 500; }
.tracker-day-btn.active { background: var(--accent-primary); color: #fff; font-weight: 700; }
.tracker-card { background: var(--panel); border-radius: var(--radius-card); overflow: hidden; box-shadow: var(--shadow-card); }
.tracker-card-head { width: 100%; background: transparent; border: none; color: var(--text); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; text-align: left; }
.tracker-card-head-row { cursor: default; gap: 10px; }
.tracker-card-head-toggle { flex: 1; min-width: 0; background: transparent; border: none; color: inherit; padding: 0; display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; text-align: left; font-family: inherit; }
.tracker-card-titlewrap { display: flex; flex-direction: column; gap: 2px; }
.tracker-card-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
.tracker-card-sub { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.tracker-badge { background: var(--accent-secondary); color: #1a1206; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.tracker-badge-ramp { background: var(--panel-3); color: var(--text-muted); }
.tracker-card-body { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
.tracker-alt-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
.tracker-alt-row strong { color: var(--text); font-weight: 600; }
.tracker-alt-row-label { flex: 1; font-size: 13px; color: var(--text); font-weight: 600; }
.tracker-lib-list { width: 100%; max-height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
.tracker-lib-row { width: 100%; background: var(--panel-2); border: none; border-radius: var(--radius-ctl); padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; text-align: left; font-family: var(--font-body); }
.tracker-lib-row-name { font-size: 13px; font-weight: 600; color: var(--text); }
.tracker-lib-row-equip { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.tracker-lib-row-score { font-size: 12px; color: var(--accent-secondary); white-space: nowrap; }
.tracker-ramp-wrap { background: var(--panel-2); border-radius: var(--radius-ctl); padding: 8px 10px; }
.tracker-ramp-toggle { background: transparent; border: none; color: var(--accent-secondary); font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; cursor: pointer; width: 100%; padding: 0; font-family: var(--font-body); }
.tracker-ramp-body { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.tracker-ramp-step { display: flex; justify-content: space-between; font-size: 12px; }
.tracker-ramp-note { font-size: 11px; color: var(--text-muted); line-height: 1.5; margin: 4px 0 0; }
.tracker-warmup-card { background: rgba(243,169,78,0.12); }
.tracker-warmup-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.tracker-timer-btn { border: none; background: var(--panel-2); color: var(--text); padding: 6px 12px; border-radius: var(--radius-pill); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.tracker-rest-label { font-size: 11px; color: var(--text-muted); }
.tracker-lastsession { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.tracker-set-rows { display: flex; flex-direction: column; gap: 6px; }
.tracker-set-row { display: grid; grid-template-columns: 28px 1fr 1fr; gap: 8px; align-items: center; }
.tracker-set-row-head { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.tracker-set-num { font-family: var(--font-mono); color: var(--accent-primary); font-size: 13px; }
.tracker-input { background: var(--panel-2); border: var(--border-w) solid transparent; color: var(--text); padding: 9px 10px; border-radius: var(--radius-ctl); font-size: 13px; font-family: var(--font-mono); width: 100%; }
.tracker-input:focus { outline: none; border-color: var(--accent-primary); }
.tracker-done-btn {
  background: var(--accent-success); color: #fff; border: none; font-weight: 700;
  padding: 10px 0; border-radius: var(--radius-pill); font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%;
  font-family: var(--font-body); margin-top: 2px;
}
.tracker-done-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.tracker-done-btn-undo { background: var(--panel-2); color: var(--text-muted); }
.tracker-save-btn { position: sticky; bottom: 12px; }
.tracker-pump-note { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.tracker-pump-row { display: grid; grid-template-columns: 2fr 1fr 1fr 28px; gap: 6px; align-items: center; }
.tracker-add-row { background: transparent; border: var(--border-w) dashed var(--panel-3); color: var(--text-muted); padding: 9px; border-radius: var(--radius-ctl); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; }
.tracker-preset-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.tracker-preset-chip { background: var(--panel-2); border: none; color: var(--text-muted); padding: 6px 12px; border-radius: var(--radius-pill); font-size: 11px; cursor: pointer; font-family: var(--font-body); }
.tracker-trend-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.tracker-select { background: var(--panel-2); border: none; color: var(--text); padding: 8px 10px; border-radius: var(--radius-ctl); font-size: 12px; flex: 1; font-family: var(--font-body); }
.tracker-empty-note { font-size: 12px; color: var(--text-muted); text-align: center; padding: 12px 0; }
.tracker-week-group-head { font-family: var(--font-display); font-weight: 800; font-size: 13px; color: var(--text-muted); margin: 6px 2px 8px; text-transform: uppercase; letter-spacing: 0.4px; }
.tracker-history-row { display: flex; justify-content: space-between; font-size: 12px; padding: 6px 0; border-bottom: 1px solid var(--panel-3); }
.tracker-history-row:last-child { border-bottom: none; }
.tracker-mono { font-family: var(--font-mono); color: var(--text-muted); }
.tracker-confirm-panel { background: rgba(255,92,114,0.12); border-radius: var(--radius-card); padding: 14px 16px; margin-bottom: 14px; }
.tracker-confirm-text { font-size: 12px; color: var(--text); line-height: 1.5; margin: 0 0 10px; }
.tracker-confirm-actions { display: flex; gap: 8px; }
.tracker-confirm-cancel { flex: 1; background: var(--panel-3); border: none; color: var(--text); padding: 10px 0; border-radius: var(--radius-pill); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-body); }
.tracker-confirm-danger { flex: 1; background: var(--accent-danger); border: none; color: #fff; padding: 10px 0; border-radius: var(--radius-pill); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-body); }
.tracker-toast {
  position: fixed; left: 50%; bottom: 84px; transform: translateX(-50%);
  z-index: 50; display: flex; align-items: center; gap: 8px; max-width: 88%;
  background: var(--accent-success); color: #fff; font-family: var(--font-body); font-weight: 700;
  font-size: 13px; padding: 12px 20px; border-radius: var(--radius-pill);
  box-shadow: 0 10px 24px rgba(0,0,0,0.5);
  animation: tracker-toast-in 0.22s ease;
}
.tracker-toast span { line-height: 1.2; }
@keyframes tracker-toast-in {
  from { opacity: 0; transform: translate(-50%, 14px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}
.tracker-share-overlay {
  position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,0.6);
  display: flex; align-items: flex-end; justify-content: center;
  animation: tracker-share-fade 0.18s ease;
}
@keyframes tracker-share-fade { from { opacity: 0; } to { opacity: 1; } }
.tracker-share-sheet {
  width: 100%; max-width: 480px; background: var(--panel); border-radius: 28px 28px 0 0;
  padding: 18px 18px 26px; display: flex; flex-direction: column; align-items: center; gap: 16px;
  animation: tracker-share-up 0.22s ease;
}
@keyframes tracker-share-up { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.tracker-share-sheet-head { width: 100%; display: flex; align-items: center; justify-content: space-between; font-family: var(--font-display); font-weight: 700; font-size: 15px; }
.tracker-share-preview-wrap { border-radius: 20px; padding: 16px; display: flex; justify-content: center; max-height: 55vh; overflow-y: auto; }
.tracker-share-preview-light { background: #e8e8ec; }
.tracker-share-preview-dark { background: #000; }
.tracker-share-preview-transparent {
  background-image: repeating-conic-gradient(#2c2c33 0% 25%, #17171b 0% 50%);
  background-size: 16px 16px;
}
.tracker-share-bg-row { display: flex; gap: 18px; }
.tracker-share-swatch { width: 34px; height: 34px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; padding: 0; box-shadow: inset 0 0 0 1px var(--panel-3); }
.tracker-share-swatch.active { border-color: var(--accent-primary); }
.tracker-share-swatch-light { background: #ffffff; }
.tracker-share-swatch-dark { background: #111114; }
.tracker-share-swatch-transparent {
  background-image: repeating-conic-gradient(#c9c9d1 0% 25%, #f2f2f4 0% 50%);
  background-size: 10px 10px;
}
.tracker-share-actions { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.tracker-share-hint { font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.4; margin: 0; }
</style>
</head>

// Each exercise's `alt` text becomes one or more selectable substitute exercises
// ("/" separates distinct options). Every main + alt gets a stable id so weight/reps
// history is tracked per-variant instead of always collapsing into the main exercise.
const customVariantId = (mainId) => `${mainId}__custom`;

const ALT_OPTIONS = {};
const EXERCISE_LOOKUP = {};
Object.values(PROGRAM).forEach((list) => list.forEach((ex) => {
  EXERCISE_LOOKUP[ex.id] = { name: ex.name, mainId: ex.id };
  const alts = ex.alt
    ? ex.alt.split("/").map((s) => s.trim()).filter(Boolean).map((name, i) => ({ id: `${ex.id}__alt${i}`, name }))
    : [];
  ALT_OPTIONS[ex.id] = alts;
  alts.forEach((a) => { EXERCISE_LOOKUP[a.id] = { name: a.name, mainId: ex.id }; });
}));

function resolveExerciseName(id, namesMap) {
  if (EXERCISE_LOOKUP[id]) return EXERCISE_LOOKUP[id].name;
  if (namesMap && namesMap[id]) return namesMap[id];
  return id;
}

function getPhaseInfo(week) {
  if (week <= 4) return { name: "Foundation", rpe: "6-7", desc: "Learn the exercises, groove technique. Don't chase weight yet.", deload: false };
  if (week <= 8) return { name: "Progressive Overload", rpe: "7-8", desc: "Add reps, then weight — beat last session on something.", deload: false };
  if (week === 9) return { name: "Deload", rpe: "5-6", desc: "Cut volume ~50%. Let joints and CNS recover.", deload: true };
  if (week <= 14) return { name: "Volume Phase", rpe: "7-8", desc: "Add 1 set to each priority (★) exercise.", deload: false };
  if (week <= 18) return { name: "Intensification", rpe: "8-9 last set", desc: "Push the last set of priority lifts harder. Keep 1-2 RIR elsewhere.", deload: false };
  if (week === 19) return { name: "Deload", rpe: "5-6", desc: "Cut volume ~50%. Recovery week.", deload: true };
  if (week <= 24) return { name: "Consolidation", rpe: "7-8", desc: "Reassess: compare photos + strength logs to week 1.", deload: false };
  return { name: "Repeat Cycle", rpe: "7-8", desc: "Restart at Progressive-Overload intensity. Rotate a stale exercise if needed.", deload: false };
}

function fmtDate(d) { return new Date(d).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); }

// Does a persisted workout draft actually hold anything the user typed?
const draftHasContent = (d) => {
  if (!d) return false;
  if (d.values && Object.keys(d.values).length > 0) return true;
  if (Array.isArray(d.pumpRows) && d.pumpRows.some((r) => r && r.name && r.name.trim())) return true;
  return false;
};

const API_BASE = "https://vtaper-server.onrender.com";

async function apiFetch(path, token, options = {}) {
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    let msg = `Request failed (${res.status})`;
    try { const body = await res.json(); if (body?.error) msg = body.error; } catch (e) {}
    throw new Error(msg);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function normalizeLog(row) {
  return { id: row.id, date: row.date, dayType: row.day_type, week: row.week, phase: row.phase, exercises: row.exercises || undefined, pump: row.pump || undefined };
}

// Reduces a log into the numbers + exercise breakdown the share card shows.
// Pump/Recovery sessions don't track weight, so they get a sets/movements
// summary instead of a volume figure.
function computeLogStats(log) {
  if (log.pump) {
    const totalSets = log.pump.reduce((sum, r) => sum + (Number(r.sets) || 0), 0);
    return {
      kind: "pump", totalSets, movementCount: log.pump.length,
      items: log.pump.map((r) => ({ name: r.name, detail: `${r.sets || "-"} × ${r.reps || "-"}` })),
    };
  }
  const entries = Object.entries(log.exercises || {}).filter(([id]) => id !== "__meta");
  let totalVolume = 0, totalSets = 0;
  const items = entries.map(([id, sets]) => {
    totalSets += sets.length;
    totalVolume += sets.reduce((s, st) => s + (Number(st.weight) || 0) * (Number(st.reps) || 0), 0);
    return { name: resolveExerciseName(id, log.exercises.__meta?.names), detail: sets.map((s) => `${s.weight || "-"}×${s.reps || "-"}`).join(" · ") };
  });
  return { kind: "lift", totalVolume, totalSets, exerciseCount: items.length, items };
}

function MiniLineChart({ data }) {
  if (data.length < 2) return <p className="tracker-empty-note">Log this exercise at least twice to see a trend.</p>;
  const w = 300, h = 150, pad = 26;
  const weights = data.map((d) => d.weight);
  const max = Math.max(...weights), min = Math.min(...weights);
  const range = max - min || 1;
  const stepX = (w - pad * 2) / (data.length - 1);
  const points = data.map((d, i) => [pad + i * stepX, h - pad - ((d.weight - min) / range) * (h - pad * 2)]);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: 160 }}>
      <polyline points={points.map((p) => p.join(",")).join(" ")} fill="none" stroke="var(--accent-primary)" strokeWidth="2" />
      {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3" fill="var(--accent-primary)" />)}
      <text x={pad} y={h - 6} fontSize="10" fill="var(--text-muted)">{data[0].date}</text>
      <text x={w - pad} y={h - 6} fontSize="10" fill="var(--text-muted)" textAnchor="end">{data[data.length - 1].date}</text>
    </svg>
  );
}

// Background-safe rest alarm. Scheduling the chime on the Web Audio hardware
// clock (instead of a setTimeout/setInterval) means it still fires when the
// phone is locked or the tab is backgrounded — where JS timers get throttled.
// A near-silent looping buffer keeps the audio session alive so the OS doesn't
// suspend the context.
const RestAudio = (() => {
  let ctx = null;
  let keepAliveSrc = null;
  let keepAliveCount = 0;

  function ensureCtx() {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    if (!ctx) ctx = new AC();
    if (ctx.state === "suspended") ctx.resume();
    return ctx;
  }

  function acquireKeepAlive() {
    if (!ensureCtx()) return;
    keepAliveCount++;
    if (keepAliveSrc) return;
    const buffer = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer = buffer; src.loop = true;
    const g = ctx.createGain(); g.gain.value = 0.0001;
    src.connect(g).connect(ctx.destination);
    src.start();
    keepAliveSrc = src;
  }

  function releaseKeepAlive() {
    keepAliveCount = Math.max(0, keepAliveCount - 1);
    if (keepAliveCount === 0 && keepAliveSrc) {
      try { keepAliveSrc.stop(); } catch (e) {}
      keepAliveSrc = null;
    }
  }

  function chimeAt(t0) {
    const notes = [[880, 0], [1175, 0.18], [1568, 0.36]]; // A5 → D6 → G6
    return notes.map(([freq, off]) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = "sine"; osc.frequency.value = freq;
      const s = t0 + off;
      g.gain.setValueAtTime(0.0001, s);
      g.gain.exponentialRampToValueAtTime(0.6, s + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0008, s + 0.4);
      osc.connect(g).connect(ctx.destination);
      osc.start(s); osc.stop(s + 0.45);
      return osc;
    });
  }

  // Short blip on start: confirms the tap AND unlocks audio inside the gesture
  // (required on iOS before any scheduled sound will play).
  function blip() {
    if (!ensureCtx()) return;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = "sine"; osc.frequency.value = 660;
    const s = ctx.currentTime;
    g.gain.setValueAtTime(0.0001, s);
    g.gain.exponentialRampToValueAtTime(0.25, s + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0008, s + 0.12);
    osc.connect(g).connect(ctx.destination);
    osc.start(s); osc.stop(s + 0.15);
  }

  // Schedule the alarm `seconds` from now. Returns a cancel() fn.
  function start(seconds) {
    if (!ensureCtx()) return () => {};
    acquireKeepAlive();
    const oscs = chimeAt(ctx.currentTime + Math.max(0, seconds));
    let released = false;
    return () => {
      if (released) return; released = true;
      oscs.forEach((o) => { try { o.stop(); } catch (e) {} });
      releaseKeepAlive();
    };
  }

  return { start, blip };
})();

function RestTimer({ seconds, label }) {
  const [remaining, setRemaining] = useState(seconds);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const intervalRef = useRef(null);
  const endTimeRef = useRef(null);
  const cancelAudioRef = useRef(null);

  const clearAudio = () => {
    if (cancelAudioRef.current) { cancelAudioRef.current(); cancelAudioRef.current = null; }
  };

  const finish = () => {
    clearInterval(intervalRef.current);
    setRemaining(0); setRunning(false); setDone(true);
    // Audio alarm was already scheduled and fires on its own (even when locked).
    // Vibrate + notification are best-effort extras for when the app is visible.
    try { navigator.vibrate && navigator.vibrate([300, 120, 300]); } catch (e) {}
    const title = "Rest over 💪", body = "Time for your next set.";
    try {
      if ("serviceWorker" in navigator && navigator.serviceWorker.controller) {
        // Shown via the SW registration — displays reliably even when backgrounded on Android.
        navigator.serviceWorker.controller.postMessage({ type: "notify", title, body });
      } else if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, { body, tag: "rest-timer" });
      }
    } catch (e) {}
  };

  // Derive remaining from the target timestamp so the display self-corrects
  // after the tab was backgrounded (where setInterval doesn't tick reliably).
  const tick = () => {
    const left = Math.round((endTimeRef.current - Date.now()) / 1000);
    if (left <= 0) finish(); else setRemaining(left);
  };

  const start = () => {
    setDone(false);
    endTimeRef.current = Date.now() + remaining * 1000;
    RestAudio.blip();
    cancelAudioRef.current = RestAudio.start(remaining);
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission().catch(() => {});
    }
    setRunning(true);
    clearInterval(intervalRef.current);
    intervalRef.current = setInterval(tick, 500);
  };

  const pause = () => {
    clearInterval(intervalRef.current);
    clearAudio();
    if (endTimeRef.current) setRemaining(Math.max(0, Math.round((endTimeRef.current - Date.now()) / 1000)));
    setRunning(false);
  };

  const reset = () => {
    clearInterval(intervalRef.current);
    clearAudio();
    endTimeRef.current = null;
    setRemaining(seconds); setRunning(false); setDone(false);
  };

  // Re-sync the instant the tab regains focus (mobile throttles background timers).
  useEffect(() => {
    const onVis = () => { if (!document.hidden && running) tick(); };
    document.addEventListener("visibilitychange", onVis);
    return () => document.removeEventListener("visibilitychange", onVis);
  }, [running]);

  // `seconds` can change after mount — e.g. swapping to a library substitute with a
  // different compound/isolation rest target. Only apply it while idle so we never
  // yank the clock out from under an active countdown.
  useEffect(() => {
    if (!running && !done) setRemaining(seconds);
  }, [seconds]);

  useEffect(() => () => { clearInterval(intervalRef.current); clearAudio(); }, []);

  const handleClick = () => { if (done) reset(); else if (running) pause(); else start(); };
  const mm = Math.floor(remaining / 60), ss = remaining % 60;

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <button onClick={handleClick} className="tracker-timer-btn"
        title="Rest timer — chimes even when your phone is locked"
        style={{ background: done ? "var(--accent-success)" : running ? "var(--accent-primary)" : "transparent",
                 color: (done || running) ? "#fff" : "var(--text)", borderColor: (done || running) ? "transparent" : "var(--panel-3)" }}>
        <E size={13}>⏱</E>
        <span style={{ fontFamily: "var(--font-mono)" }}>{done ? "Done" : `${mm}:${ss.toString().padStart(2, "0")}`}</span>
      </button>
      {(running || remaining !== seconds) && !done && (
        <button onClick={reset} className="tracker-icon-btn" title="Reset timer"><E size={12}>↺</E></button>
      )}
      <span className="tracker-rest-label">rest {label}</span>
    </div>
  );
}

function ExerciseCard({ exercise, phase, lastSession, values, onChange, isFirst, altOptions, selectedVariantId, onSelectVariant, customName, onCustomNameChange, customType, onCustomPick, done, onToggleDone }) {

  // page refresh mid-workout) — otherwise the whole point of collapsing to focus
  // on what's left would be undone by every reload.
  const [open, setOpen] = useState(!done);
  const [showRamp, setShowRamp] = useState(false);
  const [browsingLibrary, setBrowsingLibrary] = useState(false);
  const extraSet = phase.name === "Volume Phase" && exercise.priority;
  const totalSets = extraSet ? exercise.sets + 1 : exercise.sets;
  const isCustom = selectedVariantId === customVariantId(exercise.id);
  const displayName = isCustom ? (customName || "Custom substitute") : resolveExerciseName(selectedVariantId);
  const hasAnyData = Array.isArray(values) && values.some((s) => s && (s.weight || s.reps));
  // A library-sourced substitute carries its own compound/isolation type, which can
  // call for a different rep/rest target than the slot's original exercise — e.g.
  // swapping an isolation exercise for a compound library pick. Free-typed names
  // (no known type) just keep using the original exercise's target.
  const effective = (isCustom && customType && TYPE_DEFAULTS[customType]) ? TYPE_DEFAULTS[customType] : exercise;

  return (
    <div className="tracker-card" style={{ opacity: !open && done ? 0.6 : 1 }}>
      <button className="tracker-card-head" onClick={() => setOpen((o) => !o)}>
        <div className="tracker-card-titlewrap">
          <div className="tracker-card-title">
            {done && <E size={13}><span style={{ color: "var(--accent-success)" }}>✓</span></E>}
            {exercise.priority && <E size={13}><span style={{ color: "var(--accent-primary)" }}>★</span></E>}

          </div>
          <div className="tracker-card-sub">
            {exercise.target} · {totalSets}×{effective.reps} · RPE {exercise.rpe}

        </div>
        <E size={16}>{open ? "▴" : "▾"}</E>
      </button>

      {open && (
        <div className="tracker-card-body">
          <div className="tracker-alt-row">
            <E size={12}>⇄</E>
            {exercise.alt ? (
              <select className="tracker-select" value={selectedVariantId} onChange={(e) => onSelectVariant(e.target.value)}>
                <option value={exercise.id}>{exercise.name} (main)</option>
                {altOptions.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
                <option value={customVariantId(exercise.id)}>Other (type your own)</option>
              </select>
            ) : (
              <div className="tracker-alt-row-label">{displayName}</div>
            )}
            <button className="tracker-icon-btn" title={`Browse ${exercise.target} exercises`} onClick={() => setBrowsingLibrary(true)}><E size={12}>📚</E></button>
          </div>
          {isCustom && (
            <input type="text" className="tracker-input" placeholder="Type your substitute exercise"
              value={customName} onChange={(e) => onCustomNameChange(e.target.value)}
              style={{ marginBottom: 10 }} />
          )}
          {browsingLibrary && (
            <MuscleGroupPicker
              muscleGroup={exercise.target}
              onClose={() => setBrowsingLibrary(false)}
              onSelect={(ex) => {
                onSelectVariant(customVariantId(exercise.id));
                onCustomPick(ex.name, ex.type);
                setBrowsingLibrary(false);
              }}
            />
          )}

          {isFirst && (
            <div className="tracker-ramp-wrap">
              <button className="tracker-ramp-toggle" onClick={() => setShowRamp((s) => !s)}>
                <E size={13}>🔥</E> Warm-up ramp <E size={13}>{showRamp ? "▴" : "▾"}</E>
              </button>
              {showRamp && (
                <div className="tracker-ramp-body">
                  <div className="tracker-ramp-step"><span>Set 1</span><span className="tracker-mono">~50% of working weight × 8</span></div>
                  <div className="tracker-ramp-step"><span>Set 2</span><span className="tracker-mono">~75% of working weight × 5</span></div>
                  <p className="tracker-ramp-note">Then go straight into your working sets below. Do this before this exercise only — everything else today just needs a slightly conservative first set.</p>
                </div>
              )}
            </div>
          )}

          <RestTimer seconds={effective.rest} label={effective.restLabel} />

          {lastSession && (
            <div className="tracker-lastsession">Last time: {lastSession.map((s) => `${s.weight || "-"}×${s.reps || "-"}`).join("  ·  ")}</div>
          )}

          <div className="tracker-set-rows">
            <div className="tracker-set-row tracker-set-row-head"><span>Set</span><span>Weight</span><span>Reps</span></div>
            {Array.from({ length: totalSets }).map((_, i) => (
              <div className="tracker-set-row" key={i}>
                <span className="tracker-set-num">{i + 1}</span>
                <input type="number" inputMode="decimal" min="0"
                  placeholder={lastSession?.[i]?.weight ? String(lastSession[i].weight) : "kg"}
                  value={values?.[i]?.weight ?? ""}
                  onChange={(e) => onChange(selectedVariantId, i, "weight", e.target.value)}
                  className="tracker-input" />
                <input type="number" inputMode="numeric" min="0"
                  placeholder={lastSession?.[i]?.reps ? String(lastSession[i].reps) : "reps"}
                  value={values?.[i]?.reps ?? ""}
                  onChange={(e) => onChange(selectedVariantId, i, "reps", e.target.value)}
                  className="tracker-input" />
              </div>
            ))}
          </div>

          <button
            className={`tracker-done-btn ${done ? "tracker-done-btn-undo" : ""}`}
            disabled={!done && !hasAnyData}
            onClick={() => { onToggleDone(); if (!done) setOpen(false); }}
          >
            {done ? <><E size={14}>↺</E> Mark not done</> : <><E size={14}>✓</E> Done — collapse</>}
          </button>
        </div>
      )}
    </div>
  );
}

// Shows one program week as 7 real calendar days (Sun-Sat) instead of the whole
// 24-week program squeezed into tiny bars — you can actually see *which* days
// you trained. viewWeek is independent from the live program week so chevron
// navigation doesn't fight the auto-computed "current week."
function WeekCalendar({ startDate, logs, viewWeek, onChangeWeek }) {
  const cycleLen = 24;
  const cycleWeek = ((viewWeek - 1) % cycleLen) + 1;
  const cycleNum = Math.floor((viewWeek - 1) / cycleLen) + 1;
  const isDeload = cycleWeek === 9 || cycleWeek === 19;

  const weekStart = useMemo(() => {
    const d = new Date(startDate);
    d.setDate(d.getDate() + (viewWeek - 1) * 7);
    d.setHours(0, 0, 0, 0);
    return d;
  }, [startDate, viewWeek]);

  const logDayTypes = useMemo(() => {
    const map = {};
    logs.forEach((l) => { map[new Date(l.date).toDateString()] = l.dayType; });
    return map;
  }, [logs]);

  const todayKey = new Date().toDateString();
  const days = Array.from({ length: 7 }).map((_, i) => {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    return d;
  });

  return (
    <div className="tracker-weekcal">
      <div className="tracker-weekcal-head">
        <button className="tracker-icon-btn" onClick={() => onChangeWeek(viewWeek - 1)} disabled={viewWeek <= 1} title="Previous week"><E size={14}>‹</E></button>
        <div className="tracker-weekcal-caption">
          Week {cycleWeek} of {cycleLen}{cycleNum > 1 ? ` · Cycle ${cycleNum}` : ""}{isDeload ? " · Deload" : ""}
        </div>
        <button className="tracker-icon-btn" onClick={() => onChangeWeek(viewWeek + 1)} title="Next week"><E size={14}>›</E></button>
      </div>
      <div className="tracker-weekcal-row">
        {days.map((d, i) => {
          const key = d.toDateString();
          const isToday = key === todayKey;
          const loggedDayType = logDayTypes[key];
          return (
            <div key={i} className={`tracker-weekcal-day ${isToday ? "is-today" : ""}`} title={loggedDayType ? `${loggedDayType} logged` : undefined}>
              <span className="tracker-weekcal-dow">{d.toLocaleDateString(undefined, { weekday: "narrow" })}</span>
              <span className="tracker-weekcal-num">{d.getDate()}</span>
              {loggedDayType && <span className="tracker-weekcal-dot" />}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [token, setToken] = useState(null);
  const [loginUsername, setLoginUsername] = useState("");
  const [loginPassword, setLoginPassword] = useState("");
  const [loginError, setLoginError] = useState("");
  const [loggingIn, setLoggingIn] = useState(false);
  const [wakingServer, setWakingServer] = useState(false);
  const [dataError, setDataError] = useState("");
  const [startDate, setStartDate] = useState(null);
  const [logs, setLogs] = useState([]);
  const [tab, setTab] = useState("today");
  // Unsaved workout entry (day + typed numbers) is stashed in localStorage so a
  // page refresh mid-session doesn't wipe what's already filled in. Cleared on save.
  const initialDraft = useMemo(() => loadJSON("vtaper_draft", {}), []);
  const [dayType, setDayType] = useState(initialDraft.dayType || "Upper A");
  const [values, setValues] = useState(initialDraft.values || {});
  // Exercises the user has explicitly marked "done" mid-session — lets them
  // collapse a finished exercise to focus on the next one without saving to
  // history yet; the actual save still happens once, for the whole day, below.
  const [doneExercises, setDoneExercises] = useState(initialDraft.doneExercises || {});
  const [saved, setSaved] = useState(false);
  const [toast, setToast] = useState(null);
  const [expandedLog, setExpandedLog] = useState(null);
  const [trendExercise, setTrendExercise] = useState("ua2");
  const [altSelection, setAltSelection] = useState(() => loadJSON("vtaper_altSelection", {}));
  const [customAltNames, setCustomAltNames] = useState(() => loadJSON("vtaper_customAltNames", {}));
  // Compound/isolation type of a library-picked substitute, keyed the same way as
  // customAltNames. Only set when the name came from the library (not free-typed),
  // since that's the only case where we know enough to suggest a rep/rest target.
  const [customAltTypes, setCustomAltTypes] = useState(() => loadJSON("vtaper_customAltTypes", {}));
  const [pumpRows, setPumpRows] = useState(initialDraft.pumpRows || [{ name: "", sets: "", reps: "" }]);
  const [confirmingReset, setConfirmingReset] = useState(false);
  const [confirmingLogout, setConfirmingLogout] = useState(false);
  const [confirmingDeleteLog, setConfirmingDeleteLog] = useState(null);
  const [sharingLog, setSharingLog] = useState(null);
  const [shareBg, setShareBg] = useState("dark");
  const [sharing, setSharing] = useState(false);
  const shareCardRef = useRef(null);

  useEffect(() => { saveJSON("vtaper_altSelection", altSelection); }, [altSelection]);
  useEffect(() => { saveJSON("vtaper_customAltNames", customAltNames); }, [customAltNames]);
  useEffect(() => { saveJSON("vtaper_customAltTypes", customAltTypes); }, [customAltTypes]);

  // Persist the in-progress entry on every change so it survives a page refresh.
  useEffect(() => { saveJSON("vtaper_draft", { dayType, values, pumpRows, doneExercises }); }, [dayType, values, pumpRows, doneExercises]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };

  const loadAppData = async (tok) => {
    setWakingServer(true);
    setDataError("");
    try {
      const [meta, logsData] = await Promise.all([apiFetch("/api/meta", tok), apiFetch("/api/logs", tok)]);
      setStartDate(meta ? meta.start_date : null);
      setLogs((logsData || []).map(normalizeLog));
    } catch (err) {
      if (/token|credentials/i.test(err.message)) {
        localStorage.removeItem("vtaper_token");
        setToken(null);
      } else {
        setDataError(err.message || "Couldn't load your data");
      }
    } finally {
      setWakingServer(false);
      setLoading(false);
    }
  };

  useEffect(() => {
    const saved = loadJSON("vtaper_token", null);
    if (saved) {
      setToken(saved);
      loadAppData(saved);
    } else {
      setLoading(false);
    }
  }, []);

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoginError("");
    setLoggingIn(true);
    try {
      const data = await apiFetch("/api/auth/login", null, {
        method: "POST",
        body: JSON.stringify({ username: loginUsername, password: loginPassword }),
      });
      saveJSON("vtaper_token", data.token);
      setToken(data.token);
      await loadAppData(data.token);
    } catch (err) {
      setLoginError(err.message || "Login failed");
    } finally {
      setLoggingIn(false);
    }
  };

  const logout = () => {
    localStorage.removeItem("vtaper_token");
    setToken(null);
    setStartDate(null);
    setLogs([]);
  };

  const week = useMemo(() => {
    if (!startDate) return 1;
    const days = Math.floor((Date.now() - new Date(startDate).getTime()) / 86400000);
    return Math.max(1, Math.floor(days / 7) + 1);
  }, [startDate]);

  // What week the calendar strip is showing — separate from the live program
  // `week` above so paging with the chevrons doesn't get yanked back. Synced to
  // the real current week exactly once, as soon as startDate has loaded.
  const [viewWeek, setViewWeek] = useState(1);
  const viewWeekSynced = useRef(false);
  useEffect(() => {
    if (!viewWeekSynced.current && startDate) {
      setViewWeek(week);
      viewWeekSynced.current = true;
    }
  }, [week, startDate]);

  const phase = getPhaseInfo(week);

  // After each new session is logged, auto-advance to the next day in the rotation.
  // But on the first load after a refresh, don't yank the user off a draft they were
  // still filling in — keep the day their unsaved entry belongs to.
  const autoAdvanceReady = useRef(false);
  useEffect(() => {
    const lifting = logs.filter((l) => DAY_ORDER.includes(l.dayType));
    if (lifting.length === 0) return;
    const keepDraftDay = !autoAdvanceReady.current && draftHasContent(initialDraft);
    autoAdvanceReady.current = true;
    if (keepDraftDay) return;
    const last = lifting[lifting.length - 1];
    const idx = DAY_ORDER.indexOf(last.dayType);
    setDayType(DAY_ORDER[(idx + 1) % DAY_ORDER.length]);
  }, [logs.length]);

  const startProgram = async () => {
    const today = new Date().toISOString();
    setDataError("");
    try {
      await apiFetch("/api/meta", token, { method: "POST", body: JSON.stringify({ startDate: today }) });
      setStartDate(today);
    } catch (err) {
      setDataError(err.message || "Couldn't start the program");
    }
  };

  const lastSessionFor = (dt, exerciseId) => {
    const matches = logs.filter((l) => l.dayType === dt && l.exercises?.[exerciseId]);
    if (matches.length === 0) return null;
    return matches[matches.length - 1].exercises[exerciseId];
  };

  // Pre-fill this day's inputs with last time's numbers, so you're adjusting instead of retyping from scratch.
  // Seeds whichever variant (main/alt/custom) is currently selected for each exercise slot.
  const prevDayRef = useRef(dayType);
  useEffect(() => {
    if (dayType === "Pump/Recovery" || !PROGRAM[dayType]) { prevDayRef.current = dayType; return; }
    const dayChanged = prevDayRef.current !== dayType;
    prevDayRef.current = dayType;
    setValues((prev) => {
      // On a genuine day switch, start clean so the previous day's numbers aren't
      // carried over. On a refresh or when history arrives, keep whatever's already
      // typed (the restored draft) and only pre-fill still-empty exercise slots.
      const next = dayChanged ? {} : { ...prev };
      PROGRAM[dayType].forEach((ex) => {
        const vid = altSelection[ex.id] || ex.id;
        if (next[vid] && next[vid].length) return;
        const last = lastSessionFor(dayType, vid);
        if (last) next[vid] = last.map((s) => ({ weight: s.weight ?? "", reps: s.reps ?? "" }));
      });
      return next;
    });
    if (dayChanged) setDoneExercises({});
  }, [dayType, logs]);

  // Switching an exercise's variant only seeds that one slot from its own history,
  // leaving any already-typed values for other exercises untouched.
  const selectVariant = (mainId, variantId) => {
    setAltSelection((prev) => ({ ...prev, [mainId]: variantId }));
    setValues((prev) => {
      if (prev[variantId]) return prev;
      const last = lastSessionFor(dayType, variantId);
      if (!last) return prev;
      return { ...prev, [variantId]: last.map((s) => ({ weight: s.weight ?? "", reps: s.reps ?? "" })) };
    });
  };

  const toggleExerciseDone = (variantId) => {
    setDoneExercises((prev) => {
      const next = { ...prev };
      if (next[variantId]) delete next[variantId]; else next[variantId] = true;
      return next;
    });
  };

  const handleChange = (exerciseId, setIdx, field, val) => {
    const clean = stripNegative(val);
    setValues((prev) => {
      const ex = prev[exerciseId] ? [...prev[exerciseId]] : [];
      ex[setIdx] = { ...ex[setIdx], [field]: clean };
      return { ...prev, [exerciseId]: ex };
    });
  };

  const saveWorkout = async () => {
    const exercisesLogged = {};
    Object.entries(values).forEach(([id, sets]) => {
      const cleaned = sets.filter((s) => s && (s.weight || s.reps));
      if (cleaned.length > 0) exercisesLogged[id] = cleaned;
    });
    if (Object.keys(exercisesLogged).length === 0) return;

    // Custom substitute names aren't in the static exercise data, so stash them
    // alongside this log entry too — otherwise other devices couldn't resolve
    // this session's exercise names in History.
    const names = {};
    Object.keys(exercisesLogged).forEach((id) => {
      if (!EXERCISE_LOOKUP[id]) names[id] = customAltNames[id.split("__")[0]] || "Custom substitute";
    });
    if (Object.keys(names).length > 0) exercisesLogged.__meta = { names };

    setDataError("");
    try {
      const row = await apiFetch("/api/logs", token, {
        method: "POST",
        body: JSON.stringify({ date: new Date().toISOString(), dayType, week, phase: phase.name, exercises: exercisesLogged }),
      });
      setLogs((prev) => [...prev, normalizeLog(row)]);
      setValues({});
      setDoneExercises({});
      setSaved(true); setTimeout(() => setSaved(false), 2000);
      showToast("Workout saved to history");
    } catch (err) {
      setDataError(err.message || "Couldn't save that workout");
    }
  };

  const savePumpDay = async () => {
    const cleaned = pumpRows.filter((r) => r.name.trim());
    if (cleaned.length === 0) return;
    setDataError("");
    try {
      const row = await apiFetch("/api/logs", token, {
        method: "POST",
        body: JSON.stringify({ date: new Date().toISOString(), dayType: "Pump/Recovery", week, phase: phase.name, pump: cleaned }),
      });
      setLogs((prev) => [...prev, normalizeLog(row)]);
      setPumpRows([{ name: "", sets: "", reps: "" }]);
      setSaved(true); setTimeout(() => setSaved(false), 2000);
      showToast("Session saved to history");
    } catch (err) {
      setDataError(err.message || "Couldn't save that session");
    }
  };

  const deleteLog = async (id) => {
    setDataError("");
    try {
      await apiFetch(`/api/logs/${id}`, token, { method: "DELETE" });
      setLogs((prev) => prev.filter((l) => l.id !== id));
    } catch (err) {
      setDataError(err.message || "Couldn't delete that session");
    } finally {
      setConfirmingDeleteLog(null);
    }
  };

  const SHARE_CARD_RADIUS = 28;

  // Rasterizes the off-DOM ShareCard into a rounded PNG. backgroundColor must
  // stay null — html2canvas otherwise fills the *entire* output rectangle with
  // a solid color behind the card, hiding its border-radius. html2canvas's own
  // CSS border-radius emulation also turned out to be unreliable on the bottom
  // edge of this intrinsic-height card (rounds the top, flattens the bottom),
  // so instead of trusting it we let html2canvas rasterize a plain rectangle
  // (which it does correctly) and apply the rounded-corner mask ourselves with
  // a canvas clip — fully within our control, no upstream quirks to chase.
  const renderShareBlob = async () => {
    const raw = await window.html2canvas(shareCardRef.current, { backgroundColor: null, scale: 3 });
    const out = document.createElement("canvas");
    out.width = raw.width; out.height = raw.height;
    const ctx = out.getContext("2d");
    ctx.beginPath();
    ctx.roundRect(0, 0, out.width, out.height, SHARE_CARD_RADIUS * 3);
    ctx.clip();
    ctx.drawImage(raw, 0, 0);
    const blob = await new Promise((resolve) => out.toBlob(resolve, "image/png"));
    if (!blob) throw new Error("Couldn't generate the image");
    return blob;
  };

  // Hands the PNG to the native share sheet (Instagram, Messages, etc. on
  // mobile) with a same-tab download fallback for browsers without file sharing.
  const handleShare = async () => {
    if (!shareCardRef.current || !window.html2canvas) return;
    setSharing(true);
    try {
      const blob = await renderShareBlob();
      const fileName = `vtaper-${sharingLog.dayType.replace(/\W+/g, "-").toLowerCase()}-${sharingLog.date.slice(0, 10)}.png`;
      const file = new File([blob], fileName, { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: "V-Taper Log", text: `${sharingLog.dayType} workout logged with V-Taper Log 💪` });
      } else {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = fileName;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }
      setSharingLog(null);
    } catch (err) {
      if (err.name !== "AbortError") setDataError("Couldn't share that workout — try again.");
    } finally {
      setSharing(false);
    }
  };


  const resetAll = async () => {
    setConfirmingReset(false);
    setDataError("");
    try {
      await apiFetch("/api/reset", token, { method: "DELETE" });
    } catch (err) {
      setDataError(err.message || "Couldn't reset — your data may still be intact");
    }
    setLogs([]);
    setStartDate(null);
  };

  const exportData = () => {
    const payload = JSON.stringify({ startDate, logs }, null, 2);
    const blob = new Blob([payload], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `vtaper-log-backup-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const addPumpPreset = (name) => {
    setPumpRows((prev) => {
      const lastEmpty = prev.length > 0 && !prev[prev.length - 1].name.trim();
      const preset = { name, sets: name === "Easy Incline Walk" ? "1" : "2", reps: name === "Easy Incline Walk" ? "10 min" : "15-20" };
      if (lastEmpty) { const copy = [...prev]; copy[copy.length - 1] = preset; return copy; }
      return [...prev, preset];
    });
  };

  // Trend options are keyed by variant id (not name) so a main lift and its alt(s)
  // show up as distinct, separately-trackable entries. Custom substitutes used in
  // past logs are pulled in too, via the __meta.names each log carries for them.
  const trendableOptions = useMemo(() => {
    const opts = [];
    const seen = new Set();
    Object.values(PROGRAM).forEach((list) => list.forEach((ex) => {
      opts.push({ id: ex.id, name: ex.name });
      seen.add(ex.id);
      (ALT_OPTIONS[ex.id] || []).forEach((a) => { opts.push({ id: a.id, name: a.name }); seen.add(a.id); });
    }));
    logs.forEach((l) => {
      Object.keys(l.exercises || {}).forEach((id) => {
        if (id === "__meta" || seen.has(id)) return;
        opts.push({ id, name: resolveExerciseName(id, l.exercises.__meta?.names) });
        seen.add(id);
      });
    });
    return opts;
  }, [logs]);

  const trendData = useMemo(() => {
    return logs.filter((l) => l.exercises?.[trendExercise]).map((l) => {
      const sets = l.exercises[trendExercise];
      const top = Math.max(...sets.map((s) => Number(s.weight) || 0));
      return { date: fmtDate(l.date), weight: top };
    });
  }, [logs, trendExercise]);

  const liftingLogsDesc = [...logs].reverse();

  // History reads much faster grouped by program week than as one long flat
  // list — each log already carries the week it was logged under.
  const logsByWeek = useMemo(() => {
    const groups = [];
    let current = null;
    liftingLogsDesc.forEach((log) => {
      if (!current || current.week !== log.week) {
        current = { week: log.week, phase: log.phase, logs: [] };
        groups.push(current);
      }
      current.logs.push(log);
    });
    return groups;
  }, [logs]);

  if (!token) {
    return (
      <div className="tracker-root tracker-center">
        <form className="tracker-onboard" onSubmit={handleLogin}>
          <E size={36}>🏋</E>
          <h1 className="tracker-onboard-title">V-Taper Log</h1>
          <p className="tracker-onboard-sub">Log in to sync your workouts across every device.</p>
          <input className="tracker-input" style={{ width: "100%" }} placeholder="Username" value={loginUsername} onChange={(e) => setLoginUsername(e.target.value)} autoCapitalize="none" />
          <input className="tracker-input" style={{ width: "100%" }} type="password" placeholder="Password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} />
          {loginError && <p className="tracker-login-error">{loginError}</p>}
          <button className="tracker-primary-btn" type="submit" disabled={loggingIn}>{loggingIn ? "Logging in…" : "Log in"}</button>
          <p className="tracker-onboard-hint">First request can take up to a minute if the server's been idle — that's normal, not an error.</p>
        </form>
      </div>
    );
  }

  if (loading || wakingServer) {
    return (
      <div className="tracker-root tracker-center">
        <div className="tracker-onboard">
          <E size={28}>🏋</E>
          <p className="tracker-onboard-sub">Connecting to the server… this can take up to a minute if it's been idle.</p>
        </div>
      </div>
    );
  }

  if (!startDate) {
    return (
      <div className="tracker-root tracker-center">
        <div className="tracker-onboard">
          <E size={36}>🏋</E>
          <h1 className="tracker-onboard-title">V-Taper Log</h1>
          <p className="tracker-onboard-sub">Your 6-month hypertrophy program, tracked. Sets, reps, rest, and phase — all in one place.</p>
          {dataError && <p className="tracker-login-error">{dataError}</p>}
          <button className="tracker-primary-btn" onClick={startProgram}>Start Day 1 Today</button>
        </div>
      </div>
    );
  }

  return (
    <div className="tracker-root">
      {toast && (
        <div className="tracker-toast" role="status" aria-live="polite">
          <E size={16}>✅</E>
          <span>{toast}</span>
        </div>
      )}
      {sharingLog && (
        <div className="tracker-share-overlay" onClick={() => !sharing && setSharingLog(null)}>
          <div className="tracker-share-sheet" onClick={(e) => e.stopPropagation()}>
            <div className="tracker-share-sheet-head">
              <span>Share workout</span>
              <button className="tracker-icon-btn" onClick={() => setSharingLog(null)}><E size={13}>✕</E></button>
            </div>
            <div className={`tracker-share-preview-wrap tracker-share-preview-${shareBg}`}>
              <div ref={shareCardRef}><ShareCard log={sharingLog} bg={shareBg} /></div>
            </div>
            <div className="tracker-share-bg-row">
              {["light", "dark", "transparent"].map((b) => (
                <button key={b} className={`tracker-share-swatch tracker-share-swatch-${b} ${shareBg === b ? "active" : ""}`} onClick={() => setShareBg(b)} title={b} />
              ))}
            </div>
            <div className="tracker-share-actions">
              <button className="tracker-primary-btn" onClick={handleShare} disabled={sharing}>
                {sharing ? "Preparing…" : <><E size={15}>📤</E> Share</>}
              </button>
              <p className="tracker-share-hint">Opens your share sheet with the image attached — pick Instagram, then tap "Your Story."</p>
            </div>
          </div>
        </div>
      )}
      <div className="tracker-header">
        <div className="tracker-header-top">
          <div className="tracker-brand"><E size={18}>🏋</E><span>V-Taper Log</span></div>
          <div style={{ display: "flex", gap: 6 }}>
            <button className="tracker-icon-btn tracker-icon-btn-lg" onClick={exportData} title="Export backup"><E size={19}>⬇</E></button>
            <button className="tracker-icon-btn tracker-icon-btn-lg" onClick={() => setConfirmingReset(true)} title="Reset all data"><E size={19}>↺</E></button>
            <button className="tracker-icon-btn tracker-icon-btn-lg" onClick={() => setConfirmingLogout(true)} title="Log out"><E size={19}>⏻</E></button>
          </div>
        </div>

        {dataError && (
          <div className="tracker-confirm-panel">
            <p className="tracker-confirm-text">{dataError}</p>
          </div>
        )}

        {confirmingReset && (
          <div className="tracker-confirm-panel">
            <p className="tracker-confirm-text">This erases every logged workout and your start date, permanently. Consider tapping the download icon to export a backup first.</p>
            <div className="tracker-confirm-actions">
              <button className="tracker-confirm-cancel" onClick={() => setConfirmingReset(false)}>Cancel</button>
              <button className="tracker-confirm-danger" onClick={resetAll}>Yes, delete everything</button>
            </div>
          </div>
        )}

        {confirmingLogout && (
          <div className="tracker-confirm-panel">
            <p className="tracker-confirm-text">You'll need your username and password to log back in on this device. Your workout data stays safe on the server either way.</p>
            <div className="tracker-confirm-actions">
              <button className="tracker-confirm-cancel" onClick={() => setConfirmingLogout(false)}>Cancel</button>
              <button className="tracker-confirm-danger" onClick={() => { setConfirmingLogout(false); logout(); }}>Log out</button>
            </div>
          </div>
        )}

        <WeekCalendar startDate={startDate} logs={logs} viewWeek={viewWeek} onChangeWeek={(w) => setViewWeek(Math.max(1, w))} />

        <div className={`tracker-phase-banner ${phase.deload ? "is-deload" : ""}`}>
          <div className="tracker-phase-name">{phase.name}</div>
          <div className="tracker-phase-desc">{phase.desc}</div>
          <div className="tracker-phase-rpe">Target RPE {phase.rpe}</div>
        </div>

        <div className="tracker-tabs">
          <button className={`tracker-tab ${tab === "today" ? "active" : ""}`} onClick={() => setTab("today")}>Today</button>
          <button className={`tracker-tab ${tab === "history" ? "active" : ""}`} onClick={() => setTab("history")}>History</button>
        </div>
      </div>

      {tab === "today" && (
        <div className="tracker-body">
          <div className="tracker-day-select">
            {[...DAY_ORDER, "Pump/Recovery"].map((d) => (
              <button key={d} className={`tracker-day-btn ${dayType === d ? "active" : ""}`} onClick={() => setDayType(d)}>{d}</button>
            ))}
          </div>

          {dayType !== "Pump/Recovery" && (
            <div className="tracker-card tracker-warmup-card">
              <div className="tracker-card-body" style={{ paddingTop: 14 }}>
                <div className="tracker-warmup-title"><E size={14}><span style={{ color: "var(--accent-secondary)" }}>🔥</span></E>General warm-up (5-8 min, before lifting)</div>
                <p className="tracker-pump-note">5 min light cardio (bike/rower) · dynamic mobility — arm circles, band pull-aparts, hip circles{dayType.startsWith("Lower") ? ", leg swings" : ""}. Then ramp-up sets on the first exercise below.</p>
              </div>
            </div>
          )}

          {dayType === "Pump/Recovery" ? (
            <div className="tracker-card">
              <div className="tracker-card-body" style={{ paddingTop: 14 }}>
                <p className="tracker-pump-note">RPE 3-4, ~15 min, well short of failure. Tap a preset or add your own.</p>
                <div className="tracker-preset-row">
                  {PUMP_PRESETS.map((p) => <button key={p} className="tracker-preset-chip" onClick={() => addPumpPreset(p)}>{p}</button>)}
                </div>
                {pumpRows.map((row, i) => (
                  <div className="tracker-pump-row" key={i}>
                    <input className="tracker-input" placeholder="Movement" value={row.name}
                      onChange={(e) => { const r = [...pumpRows]; r[i].name = e.target.value; setPumpRows(r); }} />
                    <input className="tracker-input" placeholder="sets" value={row.sets}
                      onChange={(e) => { const r = [...pumpRows]; r[i].sets = stripNegative(e.target.value); setPumpRows(r); }} />
                    <input className="tracker-input" placeholder="reps" value={row.reps}
                      onChange={(e) => { const r = [...pumpRows]; r[i].reps = stripNegative(e.target.value); setPumpRows(r); }} />
                    <button className="tracker-icon-btn" onClick={() => setPumpRows(pumpRows.filter((_, idx) => idx !== i))}><E size={13}>🗑</E></button>
                  </div>
                ))}
                <button className="tracker-add-row" onClick={() => setPumpRows([...pumpRows, { name: "", sets: "", reps: "" }])}><E size={13}>+</E> Add movement</button>
              </div>
            </div>
          ) : (
            PROGRAM[dayType].map((ex, idx) => {
              const variantId = altSelection[ex.id] || ex.id;
              return (
                <ExerciseCard
                  key={ex.id}
                  exercise={ex}
                  phase={phase}
                  lastSession={lastSessionFor(dayType, variantId)}
                  values={values[variantId]}
                  onChange={handleChange}
                  isFirst={idx === 0}
                  altOptions={ALT_OPTIONS[ex.id] || []}
                  selectedVariantId={variantId}
                  onSelectVariant={(vid) => selectVariant(ex.id, vid)}
                  customName={customAltNames[ex.id] || ""}
                  onCustomNameChange={(text) => {
                    setCustomAltNames((prev) => ({ ...prev, [ex.id]: text }));
                    // Free-typed text has an unknown type — drop any stale type from a
                    // previous library pick so it doesn't get misapplied to this name.
                    setCustomAltTypes((prev) => { const next = { ...prev }; delete next[ex.id]; return next; });
                  }}
                  customType={customAltTypes[ex.id]}
                  onCustomPick={(name, type) => {
                    setCustomAltNames((prev) => ({ ...prev, [ex.id]: name }));
                    setCustomAltTypes((prev) => ({ ...prev, [ex.id]: type }));
                  }}
                  done={!!doneExercises[variantId]}
                  onToggleDone={() => toggleExerciseDone(variantId)}
                />
              );
            })
          )}

          <button className="tracker-primary-btn tracker-save-btn" onClick={dayType === "Pump/Recovery" ? savePumpDay : saveWorkout}>
            {saved ? <><E size={15}>✓</E> Saved</> : "Save Workout"}
          </button>
        </div>
      )}

      {tab === "history" && (
        <div className="tracker-body">
          <div className="tracker-card">
            <div className="tracker-card-body" style={{ paddingTop: 14 }}>
              <div className="tracker-trend-head">
                <E size={14}><span style={{ color: "var(--accent-primary)" }}>📈</span></E>
                <select className="tracker-select" value={trendExercise} onChange={(e) => setTrendExercise(e.target.value)}>
                  {trendableOptions.map((o) => <option key={o.id} value={o.id}>{o.name}</option>)}
                </select>
              </div>
              <MiniLineChart data={trendData} />
            </div>
          </div>

          {liftingLogsDesc.length === 0 && <p className="tracker-empty-note">No sessions logged yet.</p>}

          {logsByWeek.map((group) => (
            <div key={group.week}>
              <div className="tracker-week-group-head">Week {group.week} · {group.phase}</div>
              {group.logs.map((log, i) => {
                const key = log.id ?? log.date + i;
                const isOpen = expandedLog === key;
                return (
                  <div className="tracker-card" key={key}>
                    <div className="tracker-card-head tracker-card-head-row">
                      <button className="tracker-card-head-toggle" onClick={() => setExpandedLog(isOpen ? null : key)}>
                        <div className="tracker-card-titlewrap">
                          <div className="tracker-card-title">{log.dayType}</div>
                          <div className="tracker-card-sub">{fmtDate(log.date)}</div>
                        </div>
                        <E size={16}>{isOpen ? "▴" : "▾"}</E>
                      </button>
                      {log.id != null && (
                        <div style={{ display: "flex", gap: 6 }}>
                          <button className="tracker-icon-btn" onClick={() => { setShareBg("dark"); setSharingLog(log); }} title="Share session"><E size={13}>📤</E></button>
                          <button className="tracker-icon-btn" onClick={() => setConfirmingDeleteLog(log.id)} title="Delete session"><E size={13}>🗑</E></button>
                        </div>
                      )}
                    </div>
                    {confirmingDeleteLog === log.id && (
                      <div className="tracker-confirm-panel" style={{ margin: "0 14px 12px" }}>
                        <p className="tracker-confirm-text">Delete this {log.dayType} session from {fmtDate(log.date)}? This can't be undone.</p>
                        <div className="tracker-confirm-actions">
                          <button className="tracker-confirm-cancel" onClick={() => setConfirmingDeleteLog(null)}>Cancel</button>
                          <button className="tracker-confirm-danger" onClick={() => deleteLog(log.id)}>Delete</button>
                        </div>
                      </div>
                    )}
                    {isOpen && (
                      <div className="tracker-card-body">
                        {log.pump
                          ? log.pump.map((p, idx) => <div className="tracker-history-row" key={idx}><span>{p.name}</span><span className="tracker-mono">{p.sets}×{p.reps}</span></div>)
                          : Object.entries(log.exercises).filter(([id]) => id !== "__meta").map(([id, sets]) => {
                              const name = resolveExerciseName(id, log.exercises.__meta?.names);
                              return <div className="tracker-history-row" key={id}><span>{name}</span><span className="tracker-mono">{sets.map((s) => `${s.weight || "-"}×${s.reps || "-"}`).join("  ")}</span></div>;
                            })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
// Register the service worker so the app installs to the home screen, works
// offline, and can show the rest-over notification from the background.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW registration failed:", e));
  });
}
</script>
</body>
</html>
